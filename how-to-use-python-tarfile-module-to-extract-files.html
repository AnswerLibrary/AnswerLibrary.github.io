                <noscript>### How to Use the `tarfile` Module in Python to Extract Files

The `tarfile` module is a built-in Python library used to read and write tar archives, including those compressed with gzip, bzip2, and lzma. While often referred to as "unzipping," the process of extracting these files is straightforward.

#### Basic Extraction (Extract All)

To extract all files from a tar archive, use the `tarfile.open()` method followed by `extractall()` within a context manager:

```python
import tarfile

# Open the archive for reading
with tarfile.open('example.tar.gz', 'r:gz') as tar:
    # Extract all contents to the current directory
    tar.extractall(path='./extracted_data')
```

#### Specifying Compression Modes

You can manually specify the compression mode, or use `r:*` to allow Python to detect it automatically:
- `'r:gz'`: Open for reading with gzip compression.
- `'r:bz2'`: Open for reading with bzip2 compression.
- `'r:xz'`: Open for reading with lzma compression.
- `'r:*'`: Transparent compression detection.

#### Extracting a Single File

If you only need a specific file from the archive, use the `extract()` method:

```python
import tarfile

with tarfile.open('example.tar.gz', 'r:*') as tar:
    tar.extract('my_document.txt', path='./output')
```

#### Security Note: Safe Extraction

Extracting archives from untrusted sources can be risky due to directory traversal attacks. In Python 3.12 and later, it is recommended to use the `filter` argument for safer extraction:

```python
with tarfile.open('example.tar.gz', 'r:*') as tar:
    tar.extractall(path='./output', filter='data')
```
This ensures that files are not extracted outside of the destination directory.</noscript>
