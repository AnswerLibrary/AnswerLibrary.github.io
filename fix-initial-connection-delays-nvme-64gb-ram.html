                <noscript># Fixing Initial Connection Delays on High-End PCs (NVMe & 64GB RAM)

Despite having high-end hardware like an NVMe SSD and 64GB of RAM, initial connection delays (often manifesting as a 2-5 second hang when first loading a website or starting a stream) are usually related to network configuration or power-saving features rather than raw processing power.

### 1. Disable Network Adapter Power Management
Windows often puts the network adapter to 'sleep' to save power, which causes a delay when it needs to 'wake up' for a new request.

*   Right-click the **Start** button and select **Device Manager**.
*   Expand **Network adapters**.
*   Right-click your primary adapter (e.g., Intel Ethernet or Wi-Fi 6) and select **Properties**.
*   Go to the **Power Management** tab.
*   Uncheck **'Allow the computer to turn off this device to save power'**.
*   Click **OK**.

### 2. Disable Energy-Efficient Ethernet (EEE)
High-performance systems can experience 'micro-sleeps' due to Green Ethernet standards.

*   In the same **Properties** window for your network adapter, go to the **Advanced** tab.
*   Locate **Energy Efficient Ethernet** or **Green Ethernet** and set it to **Disabled**.
*   Locate **Interrupt Moderation** and consider setting it to **Disabled** for lower latency (though this slightly increases CPU usage).

### 3. Flush DNS and Reset TCP/IP Stack
Corrupted cache or routing tables can cause initial lookup delays.

1.  Open **Command Prompt** as Administrator.
2.  Type the following commands one by one, pressing Enter after each:
    *   `ipconfig /flushdns`
    *   `netsh int ip reset`
    *   `netsh winsock reset`
3.  Restart your PC.

### 4. Switch to a Faster DNS Provider
Often, the delay is caused by your ISP's slow DNS servers. Switching to Google or Cloudflare can eliminate 'resolving host' delays.

*   Go to **Settings > Network & Internet > Ethernet/Wi-Fi**.
*   Edit **DNS server assignment**.
*   Change to **Manual** and use:
    *   **Cloudflare:** 1.1.1.1 and 1.0.0.1
    *   **Google:** 8.8.8.8 and 8.8.4.4

### 5. Disable IPv6 (If not required)
Many local networks and ISPs still struggle with IPv6, leading to a 'fallback delay' where the PC tries IPv6, fails, and then switches to IPv4.

*   In **Network Connections**, right-click your adapter > **Properties**.
*   Uncheck **Internet Protocol Version 6 (TCP/IPv6)**.
*   Click **OK**.

### 6. Check for NVMe Driver Interference
While rare, certain NVMe drivers or 'Aggressive Link Power Management' (ALPM) in the BIOS can cause system-wide latency spikes. Ensure your NVMe firmware is updated via the manufacturer's software (like Samsung Magician or Western Digital Dashboard).</noscript>
