                <!-- Content will be rendered here by marked -->
                <noscript>Performing a DNS lookup outside of a web browser is the best way to bypass local application caching and obtain accurate, real-time results. Here are the most effective command-line tools for a clean lookup:

### 1. Using `nslookup` (Windows, macOS, Linux)
`nslookup` is a standard tool across all major operating systems. It is simple and provides basic resolution details.
- **Standard lookup:** `nslookup example.com` 
- **Query a specific server:** To bypass your ISP's DNS, query a public server directly: `nslookup example.com 8.8.8.8` (Google) or `1.1.1.1` (Cloudflare).

### 2. Using `dig` (macOS, Linux, and Windows via BIND)
`dig` (Domain Information Groper) is the preferred tool for system administrators because it provides more verbose and formatted technical data.
- **Basic lookup:** `dig example.com` 
- **Short output (IP only):** `dig example.com +short` 
- **Trace the path:** To see the full delegation path from root servers, use `dig example.com +trace`.

### 3. Using PowerShell (Windows)
On modern Windows systems, the `Resolve-DnsName` cmdlet offers more detailed output than `nslookup` and handles IPv6/IPv4 queries elegantly.
- **Command:** `Resolve-DnsName -Name example.com` 
- **Skip local cache:** Use the `-NoHostsFile` flag to ensure you aren't reading from your local hosts file.

### 4. Flush Your DNS Cache First
Even if you aren't using a browser, your Operating System might have cached the result. Before running your test, flush the OS cache:
- **Windows:** `ipconfig /flushdns` 
- **macOS:** `sudo killall -HUP mDNSResponder` 
- **Linux (systemd):** `sudo systemd-resolve --flush-caches`</noscript>
