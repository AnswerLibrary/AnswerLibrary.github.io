                <noscript># Official Broadcasters for BCCI Matches in 2026. For the 2026 cricket season, the broadcasting rights for matches involving the Board of Control for Cricket in India (BCCI) are distributed across multiple networks based on the type of tournament. ## 1. BCCI Home Internationals and Domestic Cricket (2023-2028 Cycle). Viacom18 is the exclusive global media rights holder for all international matches played within India, as well as domestic competitions like the Ranji Trophy and Syed Mushtaq Ali Trophy. - **Television:** Sports18 Network (including Sports18 1, Sports18 1 HD, and Sports18 Khel). - **Digital Streaming:** JioCinema (available for free or via subscription depending on the series). ## 2. Indian Premier League (IPL) 2026. The broadcasting rights for the IPL are split for the 2023-2027 cycle: - **Television (Linear):** Disney Star (Star Sports Network) holds the TV rights for the Indian subcontinent. - **Digital (Streaming):** Viacom18 (JioCinema) holds the digital rights for streaming matches live. ## 3. ICC Events in 2026 (T20 World Cup). Since India is co-hosting the 2026 ICC Men's T20 World Cup, it is important to note that Disney Star holds the exclusive rights for all ICC events in India until 2027. Fans can watch these matches on **Star Sports** and stream them on **Disney+ Hotstar**. ## Summary Table for 2026. | Match Type | TV Broadcaster | Digital Platform | |---|---|---| | BCCI Home Internationals | Sports18 | JioCinema | | IPL 2026 | Star Sports | JioCinema | | ICC T20 World Cup 2026 | Star Sports | Disney+ Hotstar |</noscript>
