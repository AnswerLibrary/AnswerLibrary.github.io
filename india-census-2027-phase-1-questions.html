                <!-- Content will be rendered here by marked -->
                <noscript>### Overview of India's Census 2027 Phase 1\n\nPhase 1 of the 2027 Census of India is formally known as the **House-listing and Housing Census**. This phase serves as the foundation for identifying every household across the country and gathering data on living conditions, household assets, and basic amenities. This data is crucial for the government to plan welfare schemes and infrastructure development.\n\n### Specific Questions Included in Phase 1\n\nThe House-listing phase traditionally includes approximately 31 specific questions. These are categorized into the following areas:\n\n#### 1. Housing and Infrastructure\n- **Building Details:** Predominant material used for the floor, walls, and roof.\n- **Census House Number:** Identification number assigned by local authorities.\n- **Usage:** Whether the house is used for residential, commercial, or residential-cum-other purposes.\n- **Ownership Status:** Whether the household owns the house, rents it, or has other living arrangements.\n- **Living Space:** Total number of dwelling rooms exclusively in possession of the household.\n- **Married Couples:** The number of married couples living within the household.\n\n#### 2. Basic Household Amenities\n- **Drinking Water:** The main source of drinking water and whether it is available within the premises, near the premises, or away.\n- **Lighting:** Primary source of lighting (e.g., electricity, solar, or kerosene).\n- **Sanitation:** Access to a latrine facility, the specific type of toilet, and availability of bathing facilities.\n- **Waste Water:** The type of drainage connection (closed, open, or no drainage).\n- **Cooking Facility:** Availability of a kitchen and the primary fuel used for cooking (LPG, PNG, firewood, etc.).\n\n#### 3. Household Assets and Connectivity\n- **Digital Connectivity:** Ownership of a Telephone, Mobile phone, or Smartphone, and whether the household has an active internet connection.\n- **Computing:** Access to a Laptop or Computer (with or without internet).\n- **Media:** Ownership of a Radio/Transistor or a Television.\n- **Transportation:** Ownership of a Bicycle, Scooter, Motorcycle, Moped, Car, Jeep, or Van.\n\n#### 4. Additional Data Points\n- **Food Habits:** The main cereal consumed by the household members.\n- **Communication:** Mobile number for official census-related notifications.\n\n### Importance of Phase 1\n\nPhase 1 provides the socio-economic framework required for the subsequent **Population Enumeration (Phase 2)**. It ensures that no household is missed and helps the government track indicators related to digital literacy, energy transition (LPG usage), and sanitation goals.</noscript>
            </div>
