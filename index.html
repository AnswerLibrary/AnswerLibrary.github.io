<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnswerLibrary - Knowledge Base</title>
    <meta name="description" content="Browse through our library of curated answers to improve your daily knowledge.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] text-slate-800 dark:text-slate-200 min-h-screen transition-colors duration-300">
    
    <!-- Scroll Progress -->
    <div id="scroll-progress" class="fixed top-0 left-0 h-1.5 bg-indigo-600 z-[60] transition-all duration-100" style="width: 0%"></div>
    
    <!-- Header -->
    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-lg border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-600/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                </div>
                <span class="text-xl font-black text-slate-900 dark:text-white tracking-tight">AnswerLibrary</span>
            </a>
            <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center hover:scale-110 active:scale-95 transition-all">🌓</button>
        </div>
    </header>

    <!-- Hero -->
    <main class="max-w-5xl mx-auto px-6 py-20">
        <section class="text-center mb-20">
            <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tight">Knowledge at your <span class="text-indigo-600">fingertips</span></h1>
            <p class="text-xl text-slate-500 max-w-2xl mx-auto">Browse through our library of curated answers to improve your daily knowledge.</p>
        </section>
        
        <!-- Questions Grid -->
        <div id="questions-list" class="grid md:grid-cols-2 gap-6">
            <p class="col-span-2 text-center text-slate-400 py-10">Loading library...</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-20 border-t border-slate-200 dark:border-slate-900 text-center">
        <div class="flex justify-center gap-6 mb-6">
            <a href="about.html" class="text-sm font-bold text-slate-500 hover:text-indigo-600 transition-colors">About</a>
            <a href="privacy.html" class="text-sm font-bold text-slate-500 hover:text-indigo-600 transition-colors">Privacy</a>
        </div>
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">&copy; 2026 AnswerLibrary. All rights reserved.</p>
    </footer>

    <!-- Back to Top Button -->
    <button id="back-to-top" class="fixed bottom-10 right-10 w-12 h-12 bg-indigo-600 text-white rounded-2xl shadow-2xl opacity-0 invisible transition-all duration-300 hover:scale-110 flex items-center justify-center z-50">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    </button>

    <script>
        // Toggle Dark Mode
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }
        
        // Initial Theme Check
        if(localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // Fetch and Render Questions
        fetch('questions.json')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('questions-list');
                list.innerHTML = data.map(q => `
                    <a href="${q.url}" class="group p-8 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 hover:border-indigo-500 hover:shadow-2xl hover:shadow-indigo-500/10 transition-all duration-300">
                        <span class="inline-block px-3 py-1 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 text-xs font-bold rounded-lg mb-4 uppercase tracking-widest">${q.category}</span>
                        <h3 class="text-xl font-bold mb-2 group-hover:text-indigo-600 transition-colors">${q.title}</h3>
                        <p class="text-sm opacity-70 line-clamp-2">${q.description}</p>
                    </a>
                `).join('');
            })
            .catch(err => console.error("Error:", err));

        // Scroll Progress & Back to Top Logic
        window.onscroll = () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("scroll-progress").style.width = (winScroll / height) * 100 + "%";
            
            const btt = document.getElementById("back-to-top");
            btt.style.opacity = winScroll > 300 ? "1" : "0";
            btt.style.visibility = winScroll > 300 ? "visible" : "hidden";
        };
        document.getElementById("back-to-top").onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});
    </script>
</body>
</html>
