                <!-- Content will be rendered here by marked -->
                <noscript>### Why Windows 10 DNS Lookups May Be Slow

Even when using high-speed servers like Google (8.8.8.8) or Cloudflare (1.1.1.1), Windows 10 can experience significant latency due to internal configuration settings and legacy protocols. Here are the primary reasons and how to fix them:

#### 1. Smart Multi-Homed Name Resolution
Windows 10 frequently sends DNS queries to every available network adapter (Wi-Fi, Ethernet, VPN) simultaneously. If one adapter is slow to respond or times out, it can delay the entire resolution process. 
**Fix**: Disable this in the Group Policy Editor by navigating to Computer Configuration > Administrative Templates > Network > DNS Client and enabling 'Turn off smart multi-homed name resolution'.

#### 2. IPv6 Priority Interference
Windows often prioritizes IPv6 over IPv4. If your network, ISP, or router does not handle IPv6 correctly, the OS will wait for an IPv6 timeout before falling back to the faster IPv4 protocol.
**Fix**: Disable IPv6 in your network adapter properties or prioritize IPv4 via the Windows Registry.

#### 3. LLMNR and NetBIOS Overhead
Link-Local Multicast Name Resolution (LLMNR) and NetBIOS are legacy protocols used to find local devices. Windows may attempt to use these before or alongside standard DNS, adding overhead and delay.
**Fix**: Disable LLMNR in the Group Policy Editor and disable NetBIOS under the WINS tab in your advanced TCP/IP settings.

#### 4. Corrupted DNS Cache
A local cache that contains stale or corrupted entries can cause the DNS resolver to hang or fail intermittently.
**Fix**: Open an elevated Command Prompt or PowerShell and run the command `ipconfig /flushdns` to reset the cache.

#### 5. Network Card Power Management
If your network adapter is set to save power, it may enter a low-power state and experience a 'wake-up' delay when you initiate the first DNS request of a session.
**Fix**: In Device Manager, find your network adapter, go to 'Power Management', and uncheck 'Allow the computer to turn off this device to save power'.</noscript>
