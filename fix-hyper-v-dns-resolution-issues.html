                <!-- Content will be rendered here by marked -->
                <noscript>### Troubleshooting Hyper-V DNS Resolution Issues

DNS resolution issues in Hyper-V environments typically occur due to Virtual Switch configuration errors, NAT (Network Address Translation) forwarding failures, or network adapter conflicts. Follow these steps to resolve the issue:

#### 1. Verify Virtual Switch Configuration
Ensure your Virtual Switch is correctly configured. If using an **External Switch**, verify that 'Allow management operating system to share this network adapter' is enabled in the Hyper-V Virtual Switch Manager. If you are using the **Default Switch**, remember that it uses NAT, which can sometimes fail to pass DNS traffic if the host's network changes.

#### 2. Manually Configure DNS Servers inside the VM
Often, the DHCP server in Hyper-V's internal network doesn't provide valid DNS addresses. To fix this:
1. Open **Network and Sharing Center** inside the guest VM.
2. Select **Change adapter settings**.
3. Right-click the network adapter and select **Properties**.
4. Select **Internet Protocol Version 4 (TCP/IPv4)** and click **Properties**.
5. Select 'Use the following DNS server addresses' and enter public DNS servers like `8.8.8.8` (Google) or `1.1.1.1` (Cloudflare).

#### 3. Restart the Host Network Service (HNS)
On the host machine, the Host Network Service manages the virtual networks. Restarting it can clear routing glitches:
- Open PowerShell as Administrator and run: `Restart-Service hns -Force`

#### 4. Flush the DNS Cache
Outdated entries in the DNS resolver cache can cause resolution failures. Run this on both the host and the VM:
- Open Command Prompt and type: `ipconfig /flushdns`

#### 5. Check for Network Adapter Conflicts
Third-party firewalls or VPN software on the host can interfere with Hyper-V's virtual switches. Try disabling VPNs or third-party antivirus temporarily to see if DNS resolution returns.</noscript>
