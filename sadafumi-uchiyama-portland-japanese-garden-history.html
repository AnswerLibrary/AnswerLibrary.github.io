                <!-- Content will be rendered here by marked -->
                <noscript>### Who is Sadafumi Uchiyama?

Sadafumi Uchiyama is a central figure in the modern history and evolution of the **Portland Japanese Garden**. A fourth-generation Japanese gardener and a registered landscape architect, Uchiyama has dedicated his career to the preservation and expansion of Japanese gardening traditions in North America. He served as the garden's Curator for many years and currently holds the prestigious title of **Curator Emeritus**.

### Key Contributions to the Portland Japanese Garden

*   **The Cultural Crossing Project:** Uchiyama is perhaps best known for his collaboration with world-renowned architect **Kengo Kuma** on the garden's 2017 expansion. He designed the landscape for the Cultural Village, including the Entry Garden and the LEED-certified courtyard, which seamlessly integrates the new architecture with the historic gardens.
*   **Technical and Philosophical Leadership:** As the former Director of the **International Japanese Garden Training Center**, he has been instrumental in teaching the technical skills and the philosophical heart of Japanese gardening to professionals and enthusiasts globally.
*   **Master Planning:** Uchiyama played a vital role in the long-term master planning of the site, ensuring that the original vision of the garden—established in the 1960s—remained intact while the facility evolved to handle hundreds of thousands of annual visitors.

### Significance and Legacy

Uchiyama is recognized for his ability to translate traditional Japanese design principles into the context of the Pacific Northwest environment. His work ensures that the Portland Japanese Garden continues to be regarded as the most authentic and beautiful Japanese garden outside of Japan. Through his writing, teaching, and design, he has bridged the gap between Japanese culture and Western landscape architecture.</noscript>
