                <!-- Content will be rendered here by marked -->
                <noscript>### How to Resolve 'Horrendous' Load Times for Not-Recently-Visited Websites

When a website loads slowly after a period of inactivity, it is often due to a phenomenon known as a "cold start." This happens because the infrastructure supporting the site has entered a dormant state to save resources. Here are the most effective ways to resolve this:

#### 1. Address Serverless Cold Starts
Many modern hosting platforms (like Vercel, Netlify, or AWS Lambda) use serverless functions. These spin down when not in use.
- **Fix**: Upgrade to a plan that offers "Provisioned Concurrency" or use a "warm-up" script that pings your site every 5-10 minutes to keep the instance active.
- **Alternative**: Switch to a traditional VPS or dedicated server that remains running 24/7.

#### 2. Optimize DNS Resolution
If a site hasn't been visited recently, the DNS records may have expired from the user's local or ISP cache, forcing a full lookup.
- **Fix**: Use a high-performance DNS provider like Cloudflare, Route 53, or Google DNS. Ensure your Time-to-Live (TTL) settings are balanced (e.g., 1 hour to 24 hours).

#### 3. Leverage a Global CDN
A Content Delivery Network (CDN) caches your static assets at "edge" locations worldwide.
- **Fix**: Use Cloudflare or Fastly to ensure that even if your origin server is slow to wake up, the static elements (CSS, JS, Images) are served instantly from a local edge server.

#### 4. Implement Preconnect and DNS-Prefetch
Tell the browser to start establishing connections to critical origins immediately.
- **Fix**: Add `<link rel="preconnect" href="https://your-api-endpoint.com">` to your HTML head. This saves time on the TCP/TLS handshake.

#### 5. Database Hibernation
Free-tier database providers (like Heroku or Supabase free tiers) often put databases to "sleep" after inactivity.
- **Fix**: Move to a paid "always-on" tier or implement a cron job to perform a simple query (e.g., `SELECT 1;`) every few minutes to keep the connection pool active.</noscript>
