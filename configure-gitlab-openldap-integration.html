      "text": "Configuring GitLab with OpenLDAP Integration\\n\\nTo connect GitLab to an OpenLDAP server, you must modify the main configuration file and define the server parameters. This allows for centralized authentication and automated user provisioning.\\n\\n 1. Open the GitLab Configuration\\nAccess your GitLab server via SSH and open the gitlab.rb file with root privileges:\\n\\nbash\\nsudo nano /etc/gitlab/gitlab.rb\\n\\n\\n 2. Define LDAP Settings\\nLocate the LDAP configuration block. Ensure ldap_enabled is set to true and provide your OpenLDAP server details under the main label. Use the following template as a guide:\\n\\nruby\\ngitlab_rails['ldap_enabled'] = true\\ngitlab_rails['ldap_servers'] = {\\n  'main' => {\\n    'label' => 'OpenLDAP',\\n    'host' => 'ldap.example.com',\\n    'port' => 389,\\n    'uid' => 'uid',\\n    'bind_dn' => 'cn=admin,dc=example,dc=com',\\n    'password' => 'your_admin_password',\\n    'encryption' => 'plain',  Use 'start_tls' or 'simple_tls' for secure connections\\n    'verify_certificates' => true,\\n    'base' => 'ou=users,dc=example,dc=com',\\n    'user_filter' => '(memberOf=cn=gitlab_access,ou=groups,dc=example,dc=com)',\\n    'attributes' => {\\n      'username' => ['uid', 'userid'],\\n      'email' => ['mail', 'email'],\\n      'name' => 'cn',\\n      'first_name' => 'givenName',\\n      'last_name' => 'sn'\\n    },\\n    'lowercase_usernames' => true\\n  }\\n}\\n\\n\\n 3. Essential Parameters Explained\\n uid: This is the attribute GitLab uses as the unique login identifier. For OpenLDAP, this is typically uid.\\n base: The Distinguished Name (DN) of the directory level where GitLab should begin searching for users.\\n user_filter: (Optional) Use this to restrict GitLab access to a specific group of users within your LDAP tree.\\n attributes: This section maps LDAP fields to GitLab profile fields, ensuring user metadata is synced correctly.\\n\\n 4. Apply Configuration\\nSave the file and run the reconfigure command to apply the new settings:\\n\\nbash\\nsudo gitlab-ctl reconfigure\\n\\n\\n 5. Test the Connection\\nVerify that GitLab can successfully communicate with your OpenLDAP server and find users by running the built-in check tool:\\n\\nbash\\nsudo gitlab-rake gitlab:ldap:check\\n\\nIf configured correctly, this command will return a list of users detected in the LDAP directory."

            <div id="markdown-content" class="prose prose-slate dark:prose-invert max-w-none">
                <!-- Content will be rendered here by marked -->
                <noscript>### Configuring GitLab with OpenLDAP Integration\n\nTo connect GitLab to an OpenLDAP server, you must modify the main configuration file and define the server parameters. This allows for centralized authentication and automated user provisioning.\n\n#### 1. Open the GitLab Configuration\nAccess your GitLab server via SSH and open the `gitlab.rb` file with root privileges:\n\n```bash\nsudo nano /etc/gitlab/gitlab.rb\n```\n\n#### 2. Define LDAP Settings\nLocate the LDAP configuration block. Ensure `ldap_enabled` is set to `true` and provide your OpenLDAP server details under the `main` label. Use the following template as a guide:\n\n```ruby\ngitlab_rails['ldap_enabled'] = true\ngitlab_rails['ldap_servers'] = {\n  'main' => {\n    'label' => 'OpenLDAP',\n    'host' => 'ldap.example.com',\n    'port' => 389,\n    'uid' => 'uid',\n    'bind_dn' => 'cn=admin,dc=example,dc=com',\n    'password' => 'your_admin_password',\n    'encryption' => 'plain', # Use 'start_tls' or 'simple_tls' for secure connections\n    'verify_certificates' => true,\n    'base' => 'ou=users,dc=example,dc=com',\n    'user_filter' => '(memberOf=cn=gitlab_access,ou=groups,dc=example,dc=com)',\n    'attributes' => {\n      'username' => ['uid', 'userid'],\n      'email' => ['mail', 'email'],\n      'name' => 'cn',\n      'first_name' => 'givenName',\n      'last_name' => 'sn'\n    },\n    'lowercase_usernames' => true\n  }\n}\n```\n\n#### 3. Essential Parameters Explained\n* **uid**: This is the attribute GitLab uses as the unique login identifier. For OpenLDAP, this is typically `uid`.\n* **base**: The Distinguished Name (DN) of the directory level where GitLab should begin searching for users.\n* **user_filter**: (Optional) Use this to restrict GitLab access to a specific group of users within your LDAP tree.\n* **attributes**: This section maps LDAP fields to GitLab profile fields, ensuring user metadata is synced correctly.\n\n#### 4. Apply Configuration\nSave the file and run the reconfigure command to apply the new settings:\n\n```bash\nsudo gitlab-ctl reconfigure\n```\n\n#### 5. Test the Connection\nVerify that GitLab can successfully communicate with your OpenLDAP server and find users by running the built-in check tool:\n\n```bash\nsudo gitlab-rake gitlab:ldap:check\n```\nIf configured correctly, this command will return a list of users detected in the LDAP directory.</noscript>
