                <!-- Content will be rendered here by marked -->
                <noscript># Multi-Avatar Interaction on Janitor AI

Yes, **Janitor AI does support multi-avatar interaction** through its native **Group Chat** feature. This functionality allows users to create a single chat room and invite multiple AI characters (avatars) to participate in the same conversation or roleplay session.

### How Multi-Avatar Interaction Works:
- **Room Creation**: Users can create a specific 'Room' and add several different bots from their library or the public directory.
- **Turn-Based Responses**: You can manually trigger a response from a specific character, or allow the AI to determine which character should speak next based on the flow of the conversation.
- **Dynamic Roleplay**: This feature is designed for complex storytelling where multiple characters need to interact with each other and the user simultaneously, maintaining their individual personalities and lore.
- **Management**: You can add or remove characters mid-conversation to change the group dynamic as the story evolves.

### How to Access It:
To start a multi-avatar session, navigate to the **'Group Chat'** or **'Create Room'** option (typically found in the sidebar or menu). From there, you can select the avatars you wish to include and set a 'Room Scenario' to define the setting for all characters involved. This feature significantly enhances the roleplay experience by moving beyond simple one-on-one interactions.</noscript>
