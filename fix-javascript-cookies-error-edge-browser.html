                <noscript># How to Fix JavaScript and Cookies Errors in Microsoft Edge

If you are seeing errors stating that JavaScript is disabled or cookies are blocked while using Microsoft Edge, you can usually fix the issue in under a minute by adjusting your site permissions. Follow these steps:

### 1. Enable JavaScript
JavaScript is essential for most modern websites to function correctly. To enable it:
- Click the **three dots (...)** in the top-right corner of Edge and select **Settings**.
- On the left sidebar, click **Cookies and site permissions**.
- Scroll down to the **All permissions** section and click on **JavaScript**.
- Toggle the switch to **Allowed (recommended)**.

### 2. Enable Cookies
Cookies allow websites to remember your login status and preferences. To enable them:
- In the same **Cookies and site permissions** menu, click on **Manage and delete cookies and site data** at the top.
- Ensure the toggle for **Allow sites to save and read cookie data (recommended)** is turned ON.
- If you are having trouble logging into specific sites, make sure **Block third-party cookies** is turned OFF.

### 3. Clear Browser Cache (If Errors Persist)
If the errors continue after enabling both settings, try clearing your cache:
- Go to **Settings > Privacy, search, and services**.
- Under **Clear browsing data**, click **Choose what to clear**.
- Select **Cookies and other site data** and **Cached images and files**, then click **Clear now**.

Once these settings are updated, refresh your browser or restart Edge to apply the changes.</noscript>
