                <!-- Content will be rendered here by marked -->
                <noscript># How to Structure Java Classes for Clothing

Representing clothing items effectively in Java requires a clean object-oriented design using inheritance and polymorphism. This ensures that your code is maintainable, scalable, and follows the DRY (Don't Repeat Yourself) principle.

### 1. Define an Abstract Base Class

Start with an abstract base class named `Clothing`. This class holds properties common to all garments, such as `brand`, `price`, and `material`. Making it abstract prevents the instantiation of a generic "clothing" object.

```java
public abstract class Clothing {
    private String brand;
    private double price;
    private String material;

    public Clothing(String brand, double price, String material) {
        this.brand = brand;
        this.price = price;
        this.material = material;
    }

    public abstract String getCategory();

    // Getters and setters
    public double getPrice() { return price; }
}
```

### 2. Use Enums for Constant Values

To prevent errors associated with hardcoded strings, use Enums for attributes like `Size` or `Color`. This ensures type safety throughout your application.

```java
public enum Size {
    SMALL, MEDIUM, LARGE, EXTRA_LARGE;
}
```

### 3. Implement Specific Subclasses

Create specialized subclasses for specific items like `Shirt`, `Pants`, or `Dress`. These classes can include unique attributes specific to that category.

```java
public class Shirt extends Clothing {
    private boolean isLongSleeve;

    public Shirt(String brand, double price, String material, boolean isLongSleeve) {
        super(brand, price, material);
        this.isLongSleeve = isLongSleeve;
    }

    @Override
    public String getCategory() {
        return "Shirt";
    }
}
```

### 4. Benefits of this Structure

- **Encapsulation**: Keeps data safe through private fields and public getters/setters.
- **Polymorphism**: Allows you to store different types (Shirts, Pants) in a single `List<Clothing>`.
- **Scalability**: Adding a new piece of clothing (e.g., `Jacket`) is as simple as extending the base class.</noscript>
