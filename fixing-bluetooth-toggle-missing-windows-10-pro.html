                <!-- Content will be rendered here by marked -->
                <noscript># How to Fix a Missing Bluetooth Toggle in Windows 10 Pro x64

If your Bluetooth on/off switch has disappeared from the Windows Settings menu, it usually indicates a driver conflict, a disabled service, or a hardware detection issue. Follow these steps to restore it.

### 1. Run the Windows Bluetooth Troubleshooter
Windows has a built-in tool that can automatically detect and fix common Bluetooth issues.
- Go to **Start** > **Settings** > **Update & Security** > **Troubleshoot**.
- Click **Additional troubleshooters**.
- Select **Bluetooth** and click **Run the troubleshooter**.

### 2. Enable Bluetooth Support Services
Bluetooth relies on specific services that must be running in the background.
- Press `Win + R`, type `services.msc`, and press **Enter**.
- Locate **Bluetooth Support Service**.
- Right-click it and select **Properties**.
- Set the **Startup type** to **Automatic** and click **Start** if the service isn't running.
- Repeat this for any other services starting with "Bluetooth."

### 3. Reinstall the Driver via Device Manager
Corrupted drivers are the most frequent cause of this issue.
- Right-click the **Start** button and select **Device Manager**.
- Look for the **Bluetooth** section. If it is missing, click **View** > **Show hidden devices**.
- Right-click your Bluetooth adapter (e.g., Intel Wireless Bluetooth) and select **Uninstall device**.
- **Restart your computer.** Windows will automatically attempt to reinstall the correct driver upon reboot.

### 4. Perform a Cold Boot
A "flea power" drain can sometimes reset the hardware state of the Bluetooth module.
- Shut down your computer completely.
- Unplug the power cable (and remove the battery if it is a laptop with a removable battery).
- Press and hold the **Power button** for 30 seconds.
- Plug everything back in and turn the PC on.

### 5. Check BIOS/UEFI Settings
If the toggle is still missing, ensure the Bluetooth radio is enabled at the hardware level.
- Restart your PC and enter the **BIOS/UEFI** (usually by pressing F2, F10, or Del during boot).
- Look for **Onboard Devices** or **Wireless/Connectivity** settings.
- Ensure **Bluetooth** is set to **Enabled**.</noscript>
