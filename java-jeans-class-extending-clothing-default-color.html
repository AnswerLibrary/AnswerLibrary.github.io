                <!-- Content will be rendered here by marked -->
                <noscript>### Java Inheritance: Jeans Class Example

To create a `Jeans` class that extends a `Clothing` class with a default color of blue, you use the `extends` keyword and the `super()` constructor call. This is a fundamental concept in Object-Oriented Programming (OOP) called inheritance.

#### Step 1: Create the Base Class
First, define a `Clothing` class that manages the shared attributes for all apparel items, such as color.

```java
public class Clothing {
    private String color;

    // Constructor for the base class
    public Clothing(String color) {
        this.color = color;
    }

    public String getColor() {
        return color;
    }
}
```

#### Step 2: Create the Subclass
The `Jeans` class inherits from `Clothing`. By calling `super("blue")` inside the `Jeans` constructor, you ensure that every instance of `Jeans` is initialized with the color "blue" by default.

```java
public class Jeans extends Clothing {
    public Jeans() {
        // Call the parent constructor with the default value "blue"
        super("blue");
    }
}
```

### Usage Example
You can now instantiate the `Jeans` class without passing any arguments, and it will automatically have the color "blue".

```java
public class Main {
    public static void main(String[] args) {
        Jeans myJeans = new Jeans();
        System.out.println("The color of the jeans is: " + myJeans.getColor()); 
        // Output: The color of the jeans is: blue
    }
}
```

### Key Concepts
- **extends**: This keyword creates the inheritance relationship.
- **super()**: This invokes the constructor of the parent class (`Clothing`). It must be the first statement in the subclass constructor.
- **Encapsulation**: The color field is kept private in the base class and accessed via a public getter method.</noscript>
