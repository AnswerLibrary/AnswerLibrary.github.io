                <!-- Content will be rendered here by marked -->
                <noscript>### How to Create Cinematic Portrait Photography Prompts on Bing

Creating professional-grade cinematic portraits in Bing Image Creator (powered by DALL-E 3) requires a blend of descriptive storytelling and technical photography terms. To achieve a cinematic look, you must go beyond basic descriptions and include specific lighting, lens data, and atmospheric details.

#### 1. Define Your Subject in Detail
Start with a clear description of the person, focusing on their expression and character. Instead of just 'a man,' describe his features to give the AI more texture to work with.
*   **Example:** 'A weathered fisherman with salt-and-pepper hair, deep wrinkles, and a piercing gaze, wearing a yellow oilskin jacket.'

#### 2. Specify Cinematic Lighting
Lighting is the most critical element for a cinematic feel. Use professional terminology to guide the AI's rendering:
*   **Rembrandt Lighting:** Creates a small triangle of light on the shadowed cheek, adding depth and mood.
*   **Chiaroscuro:** High-contrast lighting that emphasizes shadows and the subject's form.
*   **Volumetric Lighting:** Light rays filtered through dust or haze, creating a 3D effect.
*   **Golden Hour:** Soft, warm, low-angle light typical of sunrise or sunset.

#### 3. Use Camera and Lens Specifications
Simulate a professional camera setup to improve the realism of the output and control the background:
*   **Lens Choice:** Use an '85mm lens' or '50mm prime lens' for a natural portrait focal length.
*   **Aperture Settings:** Mention 'f/1.8' or 'f/1.2' to create a shallow depth of field, which results in a creamy, blurred background (bokeh).
*   **Film Style:** Add 'Shot on 35mm film' for a classic grainy look or 'Shot on IMAX' for high-resolution clarity.

#### 4. Setting and Color Grading
Describe the environment and the color mood of the shot to tie the image together:
*   **Color Palette:** Use 'Teal and orange color grading,' 'Muted earth tones,' or 'Cine-monochrome.'
*   **Background:** 'A rainy night in a neon-lit city' or 'A dusty Victorian library with sunbeams.'

#### 5. Sample Prompt Structure
**Template:** [Subject Description] + [Pose/Expression] + [Location] + [Lighting Style] + [Camera Settings] + [Quality Keywords]

**Example:** 'Cinematic portrait of a pensive woman looking out of a rain-streaked window, soft warm lamp light on her face, 85mm lens, f/1.2, bokeh background, hyper-realistic skin texture, 8k, filmic mood.'

#### Pro Tips for Bing Image Creator
*   **Lead with Importance:** Place the most critical elements (like 'Cinematic portrait') at the very beginning of the prompt for maximum impact.
*   **Mention Textures:** Keywords like 'detailed skin pores,' 'fine hair,' or 'fabric texture' help the AI avoid an artificial 'plastic' look.
*   **Emotional Keywords:** Words like 'ethereal,' 'gritty,' 'noir,' or 'haunting' help steer the AI toward a specific emotional tone.</noscript>
