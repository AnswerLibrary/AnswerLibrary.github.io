                <!-- Content will be rendered here by marked -->
                <noscript>### Guide to Applying for the BARC INSPIRE Fellowship (Magnetic Resonance)

The **INSPIRE Fellowship**, managed by the Department of Science and Technology (DST), allows students to pursue a Ph.D. at premier research institutions like the **Bhabha Atomic Research Centre (BARC)**. Applying for a specialization in Magnetic Resonance (NMR, EPR, or MRI) involves a dual-track process of securing the fellowship and finding a host supervisor.

#### 1. Check Your Eligibility
To apply for the INSPIRE Fellowship, you must meet one of the following criteria:
- **University Topper:** You must be the 1st Rank holder in a Gold Medalist category at the University level in Basic or Applied Sciences (M.Sc./M.Tech).
- **Top 1% Performer:** You must be among the top 1% of students in your Master’s program at the university level.

#### 2. Identify a Supervisor at BARC
Before applying on the DST portal, you need a scientist at BARC who is willing to guide your research in Magnetic Resonance. 
- Visit the [BARC Official Website](https://www.barc.gov.in/) and navigate to the **Chemistry Group** or **Physics Group** sections.
- Look for the **Magnetic Resonance Section (MRS)** or scientists working on NMR/EPR spectroscopy.
- Contact the scientist via email with your CV and a brief research statement expressing your interest in Magnetic Resonance.

#### 3. Prepare the Research Proposal
Work with your potential BARC supervisor to draft a technical research proposal. Since you are focusing on Magnetic Resonance, the proposal should highlight:
- The specific application (e.g., structural biology, material science, or quantum computing).
- The instrumentation available at BARC (e.g., high-field NMR spectrometers).
- Methodology and expected outcomes.

#### 4. Online Application via DST Portal
Once you have a mentor, follow these steps:
- **Register:** Create an account on the [INSPIRE online portal](online-inspire.gov.in).
- **Upload Documents:** You will need your rank certificate, mark sheets, and the **Endorsement Certificate** signed by the BARC supervisor and the Head of the Institution.
- **Select BARC as Host:** In the application form, list BARC as your host research institute.

#### 5. Selection and Interview
- **DST Screening:** DST will review your academic credentials and research proposal.
- **BARC Entrance:** Note that even with an INSPIRE fellowship, you may need to clear the BARC interview process for PhD students (often conducted via the Homi Bhabha National Institute - HBNI).

#### Required Documents
- Passport-sized photograph
- Class X and XII certificates
- Marksheets and Degree certificates (UG & PG)
- Rank Certificate/Gold Medal Certificate
- Detailed Project Proposal
- Endorsement Letter from BARC</noscript>
