                <!-- Content will be rendered here by marked -->
                <noscript>### S&T Capacity Building Programmes by DST

The Department of Science & Technology (DST) of India manages several flagship initiatives designed to strengthen the nation's scientific human resource and research infrastructure. Key programs include:

* **INSPIRE (Innovation in Science Pursuit for Inspired Research)**: A massive programme aimed at attracting young talent to science through scholarships at the undergraduate level and fellowships for PhD and post-doctoral research.
* **STUTI (Synergistic Training program Utilizing the Scientific and Technological Infrastructure)**: Focuses on human resource development by providing open access to scientific equipment and specialized training for faculty and scientists.
* **FIST (Fund for Improvement of S&T Infrastructure)**: Provides grants to academic institutions (schools, colleges, and universities) to establish or upgrade essential laboratories and research facilities.
* **PURSE (Promotion of University Research and Scientific Excellence)**: Provides financial support to universities with high research performance to further enhance their scientific environment.
* **SATHI (Sophisticated Analytical & Technical Help Institutes)**: Establishes centers with high-end analytical equipment that can be shared by academia, startups, and manufacturing units to foster industry-academia collaboration.
* **WISE-KIRAN (Women in Science and Engineering-KIRAN)**: A comprehensive scheme to promote gender parity in STEM. It includes **Vigyan Jyoti** for school girls and **CURIE** (Consolidation of University Research for Innovation and Excellence) for upgrading facilities in women-only universities.
* **VAJRA (Visiting Advanced Joint Research Faculty)**: Enables overseas scientists, including NRIs, to work as adjunct faculty in Indian institutions to enhance global research standards.

These programs are pivotal for fostering an ecosystem of innovation, upgrading national facilities, and nurturing top-tier scientific talent.</noscript>
