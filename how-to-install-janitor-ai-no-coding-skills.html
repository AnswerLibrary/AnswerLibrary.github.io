                <!-- Content will be rendered here by marked -->
                <noscript># How to Install and Set Up Janitor AI Without Programming Skills

Janitor AI is a popular web-based platform for interacting with AI-powered characters. The most important thing to understand is that **you do not need to install software** or write code to use it. It functions primarily through your web browser.

### Step 1: Access the Platform
Visit the official website at [janitorai.com](https://janitorai.com). Because it is a web application, it works on any device with a browser, including PCs, Macs, iPhones, and Android devices.

### Step 2: Create Your Account
1. Click the **Register** button at the top right of the page.
2. You can sign up instantly using your **Google account** or **Discord**, or simply use a standard email address.
3. Complete the profile setup by choosing a username.

### Step 3: Configuring the Chat Settings (The 'No-Code' Way)
To start chatting, the AI needs a "source" to generate responses. You have two user-friendly options that require zero technical skill:

*   **JanitorLLM (Recommended):** This is the platform's native AI model. It is the easiest to use because it is built directly into the site. Simply select it in the chat settings, and you are ready to go.
*   **OpenAI API:** If you want to use ChatGPT's engine, you can generate an API key from the OpenAI website and paste it into the 'API Settings' menu on Janitor AI. While this sounds technical, it is just a simple copy-paste job.

### Step 4: Using Janitor AI as an App (Optional)
If you want the experience of a dedicated app without actually installing one:
1. Open Janitor AI in your mobile browser (Chrome or Safari).
2. Tap the **Share** icon (iOS) or **Menu dots** (Android).
3. Select **'Add to Home Screen'**.
4. This creates an icon on your phone that opens Janitor AI in a full-screen, app-like interface.

### Step 5: Start Chatting
Simply browse the character gallery on the homepage, click on a character that interests you, and press **'Chat'**. You can start typing immediately, and the AI will respond based on the settings you chose in Step 3.</noscript>
