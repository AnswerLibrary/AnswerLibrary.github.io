                <!-- Content will be rendered here by marked -->
                <noscript>### Troubleshooting DNS Latency on Windows 11 Pro

If you are experiencing slow internet response times or websites taking too long to begin loading, DNS latency is a likely culprit. Follow these steps to diagnose and resolve the issue on Windows 11 Pro:

#### 1. Flush the DNS Cache
Old or corrupt DNS entries can cause delays. To clear the cache, open the **Terminal (Admin)** by right-clicking the Start button and run:
`ipconfig /flushdns`

#### 2. Test Latency with Command Line Tools
Identify if the problem is specific to DNS or your general connection:
- **Ping test:** Run `ping 1.1.1.1`. If the response time is low (e.g., <20ms), your connection is stable.
- **NSLookup test:** Run `nslookup google.com`. If it takes several seconds to return an IP address, your DNS server is slow.

#### 3. Change DNS Servers to a Faster Provider
ISP-provided DNS servers are often suboptimal. Switching to a high-performance provider like Cloudflare or Google can significantly reduce latency:
1. Open **Settings > Network & internet**.
2. Select your active connection (**Wi-Fi** or **Ethernet**).
3. Click **Hardware properties**.
4. Click **Edit** next to 'DNS server assignment' and set it to **Manual**.
5. Enable **IPv4** and enter:
   - **Preferred DNS:** 1.1.1.1 (Cloudflare) or 8.8.8.8 (Google)
   - **Alternate DNS:** 1.0.0.1 or 8.8.4.4
6. Click **Save**.

#### 4. Enable DNS over HTTPS (DoH)
Windows 11 supports DoH, which encrypts queries and can prevent ISP-based throttling or interference. In the same DNS assignment window where you changed the IP addresses, set **DNS encryption** to **Encrypted only (DNS over HTTPS)**.

#### 5. Reset the TCP/IP Stack
If settings are deeply misconfigured, reset the network protocols:
1. Open Terminal (Admin).
2. Execute `netsh int ip reset` and then `netsh winsock reset`.
3. **Restart your PC** for the changes to take effect.

#### 6. Use a DNS Benchmark Tool
To find the absolute fastest server for your specific location, download **GRC's DNS Benchmark**. This tool tests hundreds of public DNS servers and identifies which one provides the lowest latency for your network.</noscript>
