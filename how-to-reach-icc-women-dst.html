                <noscript># How to Reach the Internal Complaints Committee (ICC) for Women at DST

The Department of Science and Technology (DST), under the Ministry of Science and Technology, Government of India, has a functional Internal Complaints Committee (ICC) constituted under the **Sexual Harassment of Women at Workplace (Prevention, Prohibition and Redressal) Act, 2013**. 

### 1. Contact the Presiding Officer
The ICC is headed by a senior woman official (Presiding Officer). You can submit a formal written complaint to:
*   **Address:** Internal Complaints Committee, Department of Science & Technology, Technology Bhavan, New Mehrauli Road, New Delhi - 110016.
*   **Official Website:** You can find the list of current members and their specific phone extensions by visiting the [DST Official Website](https://dst.gov.in) and searching for 'Internal Complaints Committee' or checking the 'Committees' section.

### 2. Online Redressal via SHe-Box
Women employees (permanent, temporary, or visiting) can also lodge their complaints online through the **SHe-Box** (Sexual Harassment electronic Box) portal developed by the Ministry of Women and Child Development.
*   **Portal Link:** [https://shebox.nic.in/](https://shebox.nic.in/)
*   **Procedure:** Once a complaint is submitted on SHe-Box, it is directly forwarded to the concerned Ministry/Department's ICC for inquiry.

### 3. Procedure for Filing a Complaint
*   **Submission:** The complainant should submit six copies of the written complaint along with supporting documents and names/addresses of witnesses.
*   **Timeline:** The complaint must be filed within **three months** from the date of the incident (or the last incident in a series).
*   **Confidentiality:** The ICC is legally bound to keep the identity of the aggrieved woman and the details of the inquiry strictly confidential.</noscript>
