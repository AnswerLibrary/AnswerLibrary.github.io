                <!-- Content will be rendered here by marked -->
                <noscript>### Common Small Mammals of the Coconino County Desert

Coconino County, Arizona, encompasses a vast range of elevations, including the arid scrublands of the Painted Desert and the lower elevations of the Grand Canyon. Small mammals in these desert environments are masters of heat regulation and water conservation.

#### Primary Species

*   **Kangaroo Rats:** The Merriam's kangaroo rat is a desert specialist. These rodents are famous for their ability to survive without drinking water, instead obtaining hydration through the metabolic breakdown of seeds.
*   **Woodrats (Packrats):** Specifically the White-throated woodrat, which is common in Coconino County. They are known for building elaborate nests, or "middens," from sticks, rocks, and cactus joints.
*   **Black-tailed Jackrabbits:** While technically hares, they are prominent small mammals. Their oversized ears serve as radiators, dissipating body heat to help them stay cool in the desert sun.
*   **Desert Cottontails:** Smaller than jackrabbits, these rabbits are frequently seen near brushy cover at dawn and dusk (crepuscular behavior).
*   **Harris's Antelope Squirrels:** These small, striped squirrels are unique because they are diurnal, meaning they are active during the day even in high temperatures.
*   **Deer Mice and Pocket Mice:** Various species of *Peromyscus* and *Perognathus* are abundant, serving as a primary food source for larger desert predators.

#### Survival Strategies

Because the Coconino desert can reach extreme temperatures, most of these mammals are nocturnal. They spend their days in underground burrows where temperatures remain significantly lower and humidity higher. Many species also possess specialized kidneys that allow them to excrete highly concentrated waste, minimizing water loss.</noscript>
