                <!-- Content will be rendered here by marked -->
                <noscript>### Understanding DNS Lookup Latency

When you visit a website for the first time, your computer undergoes a process called a **DNS lookup** to translate the domain name (like `example.com`) into a machine-readable IP address. If you haven't visited the site before, this process is significantly slower due to the absence of **DNS caching**.

#### 1. The Role of DNS Caching
DNS records are stored at various levels to speed up future requests. For a previously visited site, the IP address is likely stored in:
- **Browser Cache:** The browser remembers the IP.
- **Operating System Cache:** The OS maintains a local DNS resolver cache.
- **ISP/Recursive Resolver Cache:** Your internet provider saves popular records.

For an unvisited site, these caches are 'cold' (empty), forcing a full recursive query.

#### 2. The Recursive Query Process
A 'cold' lookup requires the DNS resolver to communicate with multiple servers across the globe:
1. **Root Nameservers:** The resolver asks where to find the TLD (Top-Level Domain).
2. **TLD Nameservers:** The resolver is directed to servers for `.com`, `.org`, etc.
3. **Authoritative Nameservers:** These servers hold the specific IP record for the domain.

#### 3. Network Latency and Round Trips
Each step in the recursive process involves a network 'round trip.' Since these servers are physically located in different parts of the world, the cumulative time (latency) of querying three or four different servers adds up to a noticeable delay compared to a local cache hit, which takes nearly zero time.

#### Summary
Once the lookup is complete, the result is saved with a **Time to Live (TTL)** value. This ensures that subsequent visits are nearly instantaneous until the cache expires.</noscript>
