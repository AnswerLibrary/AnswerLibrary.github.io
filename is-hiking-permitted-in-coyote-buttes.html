                <!-- Content will be rendered here by marked -->
                <noscript># Hiking in Coyote Buttes

Yes, hiking is permitted in the Coyote Buttes area, but it is **strictly regulated** by the Bureau of Land Management (BLM) through a permit system. This area, located within the Paria Canyon-Vermilion Cliffs Wilderness on the Arizona-Utah border, is famous for its fragile sandstone formations. To preserve the landscape, the BLM strictly limits the number of visitors per day.

### Coyote Buttes North (The Wave)
The North section is home to the world-famous 'Wave.' Because of its extreme popularity, permits are issued via a highly competitive lottery. There are two main ways to apply:
1. **Advanced Lottery:** Applications are submitted online four months in advance.
2. **Daily Lottery:** Permits are issued for the following day via a geofenced mobile application for those physically in the local area.

### Coyote Buttes South
The South section contains equally stunning formations like Cottonwood Cove and Paw Hole. While it still requires a permit, it is generally easier to secure than the North section, though it requires a high-clearance 4WD vehicle to access.

### Essential Hiking Information
* **No Marked Trails:** There are no maintained trails in Coyote Buttes. Hikers must be proficient in land navigation or use the GPS coordinates provided by the BLM.
* **Day Use Only:** Overnight camping is prohibited within the permit zones to protect the environment.
* **Preparation:** The area is a high-desert environment. Hikers should carry at least one gallon of water per person, as summer temperatures frequently exceed 100°F (38°C).</noscript>
