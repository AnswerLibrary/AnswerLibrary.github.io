      "text": "How to Manage Third-Party Cookie Settings in Brave Browser\\n\\nBrave Browser provides robust privacy controls through its 'Shields' system, which blocks trackers and third-party cookies by default. You can customize these settings globally or for specific websites using the steps below.\\n\\n 1. Global Settings (via Shields)\\n- Open Brave and click on the hamburger menu (three horizontal lines) in the top-right corner.\\n- Select Settings.\\n- Click on Shields in the left-hand navigation pane.\\n- Look for the Cookie blocking dropdown menu. You can choose between:\\n  - Only cross-site: Blocks cookies from sites other than the one you are visiting (Recommended).\\n  - Disabled: Allows all cookies to be stored.\\n  - All: Blocks every cookie, which may prevent many websites from functioning properly.\\n\\n 2. Advanced Privacy and Security Settings\\n- Go to Settings > Privacy and security.\\n- Select Cookies and other site data.\\n- From here, you can enable 'Block third-party cookies' or set Brave to 'Clear cookies and site data when you close all windows.'\\n- You can also add specific websites to the Always allow or Always block lists to create exceptions to your global rules.\\n\\n 3. Managing Cookies for Individual Sites\\n- Navigate to the website you want to manage.\\n- Click the Brave Shield icon (the lion head) located on the right side of the address bar.\\n- Toggle the setting for Advanced controls to change cookie blocking for that specific site without affecting your global preferences. This is useful if a trusted site requires third-party cookies to log in or process payments."

                <!-- Content will be rendered here by marked -->
                <noscript># How to Manage Third-Party Cookie Settings in Brave Browser\n\nBrave Browser provides robust privacy controls through its 'Shields' system, which blocks trackers and third-party cookies by default. You can customize these settings globally or for specific websites using the steps below.\n\n### 1. Global Settings (via Shields)\n- Open Brave and click on the **hamburger menu** (three horizontal lines) in the top-right corner.\n- Select **Settings**.\n- Click on **Shields** in the left-hand navigation pane.\n- Look for the **Cookie blocking** dropdown menu. You can choose between:\n  - **Only cross-site**: Blocks cookies from sites other than the one you are visiting (Recommended).\n  - **Disabled**: Allows all cookies to be stored.\n  - **All**: Blocks every cookie, which may prevent many websites from functioning properly.\n\n### 2. Advanced Privacy and Security Settings\n- Go to **Settings** > **Privacy and security**.\n- Select **Cookies and other site data**.\n- From here, you can enable 'Block third-party cookies' or set Brave to 'Clear cookies and site data when you close all windows.'\n- You can also add specific websites to the **Always allow** or **Always block** lists to create exceptions to your global rules.\n\n### 3. Managing Cookies for Individual Sites\n- Navigate to the website you want to manage.\n- Click the **Brave Shield icon** (the lion head) located on the right side of the address bar.\n- Toggle the setting for **Advanced controls** to change cookie blocking for that specific site without affecting your global preferences. This is useful if a trusted site requires third-party cookies to log in or process payments.</noscript>
            </div>
