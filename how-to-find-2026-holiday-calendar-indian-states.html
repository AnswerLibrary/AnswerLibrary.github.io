                <!-- Content will be rendered here by marked -->
                <noscript>### How to Find the 2026 Holiday Calendar for Indian States Finding the 2026 holiday list for specific Indian states involves checking official government notifications, as regional holidays like Pongal, Onam, or Chhath Puja differ by location. Here is a guide to finding these lists: #### 1. Official State Government Portals The most reliable source is the official website of the respective state government. Navigate to the General Administration Department (GAD) or Public Relations section. Most states release a PDF notification listing Gazetted and Restricted holidays by late 2025. #### 2. Effective Search Keywords Use specific search strings on Google to find PDF downloads directly: - [State Name] Government Holiday List 2026 PDF - Karnataka State Public Holidays 2026 Notification - Tamil Nadu Government Gazetted Holidays 2026 #### 3. Central Government Holidays (DoPT) For holidays applicable to central government employees across India, check the Department of Personnel and Training (DoPT) website. They usually release the annual calendar for the upcoming year mid-way through the current year. #### 4. Bank Holidays via RBI The Reserve Bank of India (RBI) provides a state-wise breakdown of bank holidays under the Negotiable Instruments Act. This is essential for financial planning as bank holidays often differ from state public holidays. #### 5. Reliable News and Financial Portals Once the official notifications are out, major news outlets and financial websites like The Economic Times or ClearTax compile these lists into easy-to-read tables for every state. Note that while major national holidays (Republic Day, Independence Day, Gandhi Jayanti) are fixed, the dates for religious festivals are subject to lunar sightings and are finalized in the months leading up to 2026.</noscript>
