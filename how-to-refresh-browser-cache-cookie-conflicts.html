                <noscript># How to Refresh Browser Cache and Resolve Cookie Conflicts

Website errors, login loops, or display issues are often caused by outdated data stored in your browser. Refreshing your cache and clearing cookies can resolve these conflicts by forcing the browser to fetch the most recent data from the server.

### 1. The Quick Fix: Hard Refresh
A hard refresh bypasses the local cache for the current page.
- **Windows/Linux:** Press `Ctrl + F5` or `Ctrl + Shift + R`.
- **Mac:** Press `Cmd + Shift + R`.

### 2. Clearing Cache and Cookies by Browser

#### Google Chrome
1. Click the **three dots** (top-right) and select **Clear Browsing Data**.
2. Set the time range to **All time**.
3. Check **Cookies and other site data** and **Cached images and files**.
4. Click **Clear data**.

#### Mozilla Firefox
1. Click the **hamburger menu** and select **Settings**.
2. Navigate to **Privacy & Security**.
3. In the **Cookies and Site Data** section, click **Clear Data**.
4. Ensure both options are checked and click **Clear**.

#### Microsoft Edge
1. Click the **three dots** and select **Settings**.
2. Click **Privacy, search, and services**.
3. Under **Clear browsing data**, click **Choose what to clear**.
4. Select **All time**, check the boxes for cookies and cache, and click **Clear now**.

#### Safari (Mac)
1. Go to **Safari** in the top menu and select **Settings**.
2. Click the **Privacy** tab and select **Manage Website Data**.
3. Click **Remove All** to clear everything or select specific sites.

### 3. Why This Works
Cookie conflicts occur when a website expects a specific session token or preference that has changed on the server side but remains outdated in your browser. Clearing this data ensures a clean state for your next connection.</noscript>
