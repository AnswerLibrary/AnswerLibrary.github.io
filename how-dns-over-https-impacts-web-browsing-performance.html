                <!-- Content will be rendered here by marked -->
                <noscript># How DNS-over-HTTPS (DoH) Impacts Web Browsing Performance

DNS-over-HTTPS (DoH) is a protocol that encrypts DNS queries by sending them through an encrypted HTTPS session. While it significantly enhances privacy and security, its impact on performance is a subject of technical discussion.

### 1. Increased Latency
Standard DNS uses the **UDP (User Datagram Protocol)**, which is connectionless and very fast. DoH, however, requires a **TCP handshake** and a **TLS (Transport Layer Security) handshake** before any data is sent. This overhead can add several milliseconds to the initial DNS resolution time compared to traditional plain-text DNS.

### 2. Connection Reuse and HTTP/2
To mitigate the latency of repeated handshakes, DoH implementations typically use **HTTP/2 or HTTP/3**. These protocols support features like:
*   **Multiplexing:** Multiple DNS requests can be sent over a single connection.
*   **Keep-alive:** The connection remains open, so subsequent queries don't require new handshakes.
*   **Server Push:** Some servers can proactively push DNS records to the client.

### 3. Impact of Caching
Both web browsers and operating systems employ **DNS caching**. Once a domain name is resolved via DoH, the result is stored locally for a duration specified by the TTL (Time to Live). Consequently, for frequently visited sites, the performance impact of DoH is virtually zero because the DNS lookup doesn't need to happen over the network again.

### 4. Network Reliability
In some network environments, standard DNS traffic (Port 53) may be throttled or intercepted by ISPs or middleboxes. Because DoH traffic looks like regular HTTPS traffic (Port 443), it can sometimes be **more reliable and faster** on congested or restricted networks where UDP traffic is treated as lower priority.

### 5. Resolver Speed
The choice of the **DoH provider** (such as Cloudflare, Google, or Quad9) often matters more than the protocol itself. If the DoH resolver is geographically closer or has a better-optimized infrastructure than your ISP's local DNS server, you might actually experience a speed increase despite the encryption overhead.

### Conclusion
In most real-world scenarios, the performance hit from DNS-over-HTTPS is **negligible (usually between 1-10 milliseconds)**. For the vast majority of users, the trade-off—sacrificing a tiny amount of speed for significantly improved privacy and protection against DNS spoofing—is well worth it.</noscript>
