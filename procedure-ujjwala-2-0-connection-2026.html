      "text": "Procedure for Ujjwala 2.0 Connection in 2026\\n\\nPradhan Mantri Ujjwala Yojana (PMUY) 2.0 continues to provide deposit-free LPG connections to women from low-income households. The procedure in 2026 is designed to be user-friendly, prioritizing digital applications to ensure transparency and speed.\\n\\n 1. Eligibility Criteria\\nTo apply for a new connection, the applicant must meet the following requirements:\\n- The applicant must be a woman aged 18 years or older.\\n- There must be no existing LPG connection from any Oil Marketing Company (OMC) in the same household.\\n- The applicant must belong to eligible categories such as SC/ST, Most Backward Classes (MBC), Antyodaya Anna Yojana (AAY), Forest Dwellers, or identify as a poor household under the 14-point declaration.\\n\\n 2. Documentation Needed\\nApplicants should have the following documents ready:\\n- KYC: Aadhaar Card is mandatory for identity and address proof.\\n- Ration Card: A state-issued ration card or an equivalent document/self-declaration for migrant families.\\n- Bank Account: Details (IFSC and Account Number) for the transfer of subsidies.\\n- Mobile Number: For registration and tracking.\\n\\n 3. Application Process\\n Online Method\\n1. Visit the official PMUY portal at [pmuy.gov.in](https://www.pmuy.gov.in/).\\n2. Click on the 'Apply for New Ujjwala 2.0 Connection' button.\\n3. Select your preferred LPG provider (Indane, BharatGas, or HP Gas).\\n4. You will be redirected to the distributor's website to fill out the digital KYC form.\\n5. Upload the required documents and submit the application.\\n\\n Offline Method\\n1. Visit the nearest LPG distributorship in your area.\\n2. Collect the Ujjwala 2.0 application form.\\n3. Submit the completed form along with photocopies of the required documents.\\n\\n 4. Verification and Benefits\\nOnce the application is submitted, the distributor will verify the details. Upon successful verification, the connection is released. Benefits include a deposit-free LPG connection, the first cylinder refill for free, and a free gas stove (hot plate)."

                <!-- Content will be rendered here by marked -->
                <noscript># Procedure for Ujjwala 2.0 Connection in 2026\n\nPradhan Mantri Ujjwala Yojana (PMUY) 2.0 continues to provide deposit-free LPG connections to women from low-income households. The procedure in 2026 is designed to be user-friendly, prioritizing digital applications to ensure transparency and speed.\n\n### 1. Eligibility Criteria\nTo apply for a new connection, the applicant must meet the following requirements:\n- The applicant must be a woman aged 18 years or older.\n- There must be no existing LPG connection from any Oil Marketing Company (OMC) in the same household.\n- The applicant must belong to eligible categories such as SC/ST, Most Backward Classes (MBC), Antyodaya Anna Yojana (AAY), Forest Dwellers, or identify as a poor household under the 14-point declaration.\n\n### 2. Documentation Needed\nApplicants should have the following documents ready:\n- **KYC:** Aadhaar Card is mandatory for identity and address proof.\n- **Ration Card:** A state-issued ration card or an equivalent document/self-declaration for migrant families.\n- **Bank Account:** Details (IFSC and Account Number) for the transfer of subsidies.\n- **Mobile Number:** For registration and tracking.\n\n### 3. Application Process\n#### Online Method\n1. Visit the official PMUY portal at [pmuy.gov.in](https://www.pmuy.gov.in/).\n2. Click on the 'Apply for New Ujjwala 2.0 Connection' button.\n3. Select your preferred LPG provider (Indane, BharatGas, or HP Gas).\n4. You will be redirected to the distributor's website to fill out the digital KYC form.\n5. Upload the required documents and submit the application.\n\n#### Offline Method\n1. Visit the nearest LPG distributorship in your area.\n2. Collect the Ujjwala 2.0 application form.\n3. Submit the completed form along with photocopies of the required documents.\n\n### 4. Verification and Benefits\nOnce the application is submitted, the distributor will verify the details. Upon successful verification, the connection is released. Benefits include a deposit-free LPG connection, the first cylinder refill for free, and a free gas stove (hot plate).</noscript>
