                <!-- Content will be rendered here by marked -->
                <noscript>### Why Virtual Adapter DNS Overrides Your Settings

When a specific DNS server in a virtual adapter (such as one used by a VPN, Docker, or VMware) overrides your main settings, it is usually due to the **Interface Metric** or the **Name Resolution Policy Table (NRPT)**. Operating systems use these mechanisms to prioritize network traffic and ensure connectivity for specialized environments.

#### 1. Interface Metric (Priority)
Both Windows and Linux assign a 'metric' value to every network interface to determine priority. The system automatically routes traffic through the interface with the lowest metric. Virtual adapters often programmatically set their metric lower than your physical Wi-Fi or Ethernet card to ensure that all traffic—including DNS queries—is handled by the virtual bridge or tunnel first.

#### 2. DNS Leak Protection
VPN clients are specifically designed to prevent 'DNS leaks,' which occur when DNS queries are sent outside the encrypted tunnel to your ISP's servers. To prevent this, the VPN software force-overrides system-wide DNS settings, ensuring all lookups are directed to the VPN's private, secure DNS resolvers.

#### 3. Name Resolution Policy Table (NRPT)
In Windows environments, the NRPT allows the OS to route specific DNS queries to specific servers based on the domain suffix (e.g., routing all *.corp queries to a corporate DNS). If a virtual adapter adds an NRPT rule, it will intercept those specific queries regardless of what your primary adapter's settings are.

#### 4. Virtualization and Container Networking
Tools like Docker, WSL2, or VirtualBox often create virtual switches that act as a local DNS proxy. This is necessary to resolve internal hostnames (like container names) before forwarding the remaining requests to the public internet. If this proxy is higher in the binding order, it effectively overrides your manual settings.</noscript>
