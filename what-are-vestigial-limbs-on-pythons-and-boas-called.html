                <!-- Content will be rendered here by marked -->
                <noscript># Vestigial Limbs in Pythons and Boas: Pelvic Spurs

The vestigial limbs found on pythons and boas are officially called **pelvic spurs** (or anal spurs). These small, claw-like protrusions are the evolutionary remnants of hind legs, providing physical evidence that snakes evolved from four-legged ancestors.

### Location and Anatomy
Pelvic spurs are located on either side of the **cloaca** (the vent). They are the external tip of a vestigial pelvic girdle that is embedded deep within the snake's body musculature. Although they are no longer used for locomotion, these structures remain physically connected to internal skeletal remnants of a pelvis and femur.

### Purpose and Function
While they are considered vestigial because they have lost their original function (walking), they still serve specific purposes in modern basal snakes:
* **Mating and Courtship**: Male pythons and boas use their spurs to scratch and stimulate the female during courtship, which helps trigger her receptivity.
* **Alignment**: The spurs assist the male in maintaining a grip and aligning his body correctly with the female during copulation.
* **Combat**: In some species, males may use their spurs during physical wrestling matches with rival males.

### Evolutionary Significance
The presence of pelvic spurs is a characteristic of "primitive" or basal snake families, specifically **Boidae** (boas) and **Pythonidae** (pythons). In contrast, more evolutionarily "advanced" snakes, such as colubrids (kingsnakes, garter snakes) and vipers, have completely lost these external skeletal remnants over millions of years of evolution.</noscript>
