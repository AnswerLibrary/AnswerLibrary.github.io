                <!-- Content will be rendered here by marked -->
                <noscript># Janitor AI Premium Subscription and Pricing Guide

Currently, **Janitor AI does not have a formal premium subscription fee** for its core platform. Unlike many AI services that charge a monthly flat rate, Janitor AI is primarily free to use. However, understanding the 'costs' associated with premium performance requires looking at the different ways the AI can be powered.

### 1. JanitorLLM (The Free Option)
Janitor AI has developed its own large language model called **JanitorLLM**. As of the latest update, this model is in its beta phase and is **free for all users** who have a verified account. There is no subscription required to use this native model, though users are encouraged to support the developers through community platforms.

### 2. External API Costs (OpenAI and Anthropic)
For users who want a 'premium' experience using more advanced models like GPT-4 or Claude, the cost is not paid to Janitor AI but to the API providers. You must provide your own API key, and you will be billed based on your token usage:
- **OpenAI (GPT-4/GPT-3.5):** Costs vary from $0.03 to $0.06 per 1,000 tokens depending on the model.
- **Anthropic (Claude):** Pricing depends on the version (Haiku, Sonnet, or Opus) and token consumption.

### 3. Patreon and Donations
While not a mandatory subscription, Janitor AI offers a **Patreon** for dedicated fans. Supporting the platform through Patreon often grants users early access to new features, experimental models, or specific discord roles. This is a voluntary contribution rather than a paywall for basic functionality.

### Summary of Costs
- **Base Platform:** $0 (Free)
- **JanitorLLM (Beta):** $0 (Free for verified accounts)
- **External APIs:** Pay-as-you-go (usually $5–$20/month depending on your personal usage levels).</noscript>
