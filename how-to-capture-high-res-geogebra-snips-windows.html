                <!-- Content will be rendered here by marked -->
                <noscript># How to Capture High-Resolution Images from GeoGebra on Windows

Using the standard Windows Snipping Tool (`Win + Shift + S`) often results in low-resolution (96 DPI) images that look blurry in print or high-quality documents. For professional, high-resolution results, you should use GeoGebra's built-in export features.

### Method 1: The Export Menu (Best for PNG/JPG)
1. **Open your GeoGebra file** and arrange the view exactly how you want it.
2. Go to the **Menu** (three horizontal lines) in the top right corner.
3. Select **Download As** (or **Export** in older versions).
4. Choose **Image (.png)**.
5. In the pop-up, you can manually enter the width/height or adjust the scale. To get a high-resolution image, increase the **Scale** (e.g., set it to 2.0 or 3.0).

### Method 2: Vector Graphics (Infinite Resolution)
If you are using the image for a document or a presentation, vector formats are superior because they never lose quality when resized.
1. Go to **Menu > Download As**.
2. Select **Scalable Vector Graphics (.svg)** or **PDF Document (.pdf)**.
3. These files can be inserted directly into Word, PowerPoint, or LaTeX and will remain perfectly sharp at any zoom level.

### Method 3: High-Res Clipboard Copy (Classic 5 Only)
If you are using GeoGebra Classic 5 on Windows, you can use a powerful shortcut:
- Press **Ctrl + Shift + C**.
- This copies the current Graphics View to your clipboard as a high-resolution bitmap or metafile, which you can then paste (`Ctrl + V`) directly into your document.

### Pro Tip: Line Thickness and Labeling
When exporting for high-res output, the lines might look thin. Before exporting, go to **Settings > Graphics** and increase the **Line Thickness** and **Font Size** (e.g., to 18pt or 24pt) to ensure clarity on high-density displays.</noscript>
