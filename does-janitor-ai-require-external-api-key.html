                <!-- Content will be rendered here by marked -->
                <noscript>Janitor AI no longer strictly requires an external API key for basic chatting. While the platform initially relied on third-party services like OpenAI or KoboldAI, it has since introduced its own native solution.\n\n### JanitorLLM (The Free Option)\nJanitor AI now features **JanitorLLM**, a proprietary large language model hosted directly by the platform. This model is currently free to use and does not require any external API keys or configurations. Once you create an account, you can simply select 'JanitorLLM' in your chat settings to begin interacting with characters immediately.\n\n### When is an API Key Still Needed?\nWhile not required for basic use, external API keys are still supported for users who prefer specific high-end models:\n- **OpenAI:** Requires a paid API key to access GPT-4 or GPT-3.5.\n- **KoboldAI:** Used for connecting to local setups or specific open-source models.\n- **Claude/Anthropic:** Can be used via specialized proxy settings for advanced roleplay.\n\n### How to Chat Without a Key\n1. Open a chat with any character on the site.\n2. Click the **'API Settings'** button (usually located in the top-right corner).\n3. Change the API selection to **'JanitorLLM'**.\n4. Save settings and start your conversation.\n\nIn summary, Janitor AI is now accessible for free without the need for external API credentials, provided you use their built-in JanitorLLM.</noscript>
