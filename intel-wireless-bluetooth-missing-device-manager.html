                <!-- Content will be rendered here by marked -->
                <noscript>### Reasons Why Intel Wireless Bluetooth May Be Missing

If **Intel Wireless Bluetooth** has disappeared from your Device Manager, it usually indicates a driver conflict, a service failure, or a hardware detection issue. Below are the most common causes and their solutions:

#### 1. Show Hidden Devices
Sometimes the Bluetooth adapter is present but hidden because Windows thinks it is disconnected. 
- Open **Device Manager**.
- Click **View** in the top menu.
- Select **Show hidden devices**.
- Check if Bluetooth appears under a grayed-out icon.

#### 2. Restart Bluetooth Support Service
Windows services manage how hardware interacts with the OS. If the service isn't running, the device won't show up.
- Press `Win + R`, type `services.msc`, and hit Enter.
- Find **Bluetooth Support Service**.
- Right-click it and select **Restart**.
- Double-click it and set the **Startup type** to **Automatic**.

#### 3. Perform a Cold Boot (Power Cycle)
Static electricity or a hung controller state can cause the BIOS to stop reporting the Bluetooth module to Windows.
- Shut down your computer completely.
- Unplug the power cable (and remove the battery if it's a laptop with a removable battery).
- Hold the **Power Button** for 30 seconds.
- Plug everything back in and turn the PC on.

#### 4. Reinstall Intel Bluetooth Drivers
Corrupted drivers can cause the device to vanish.
- Go to the **Intel Driver & Support Assistant (Intel DSA)** website.
- Download the latest Bluetooth driver for your specific Intel card.
- If the device is totally missing, manually installing the `.exe` often forces Windows to re-detect the hardware.

#### 5. Check BIOS/UEFI Settings
If the Bluetooth radio is disabled at the motherboard level, Windows will never see it.
- Restart your PC and enter the **BIOS/UEFI** (usually by pressing F2, Del, or F12 during boot).
- Look for **Wireless**, **Onboard Devices**, or **Connectivity** settings.
- Ensure **Bluetooth** or **WLAN/BT** is set to **Enabled**.

#### 6. Run the Windows Troubleshooter
- Go to **Settings > System > Troubleshoot > Other troubleshooters**.
- Run the **Bluetooth** troubleshooter to let Windows automatically attempt a repair.</noscript>
