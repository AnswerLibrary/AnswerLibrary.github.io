                <!-- Content will be rendered here by marked -->
                <noscript>### Speeding Up Keyboard Cursor Movement for Screen Captures

When using built-in screen capture tools on Windows or macOS, you can move the selection cursor or the entire capture area significantly faster by using the **Shift** modifier key. This allows you to jump across the screen rather than moving pixel-by-pixel.

#### On Windows (Snipping Tool / Snip & Sketch)
1. **Initiate the Tool:** Press `Win + Shift + S` to start the capture.
2. **Precision Movement:** Use the standard **Arrow keys** to move the cursor one pixel at a time.
3. **Fast Movement:** Hold the **Shift key** while pressing the **Arrow keys** to move the cursor in 10-pixel increments.
4. **Selection Control:** Use the `Spacebar` to toggle between moving the cursor and starting a selection area.

#### On macOS (Screenshot Utility)
1. **Initiate the Tool:** Press `Cmd + Shift + 4` for a selected area capture.
2. **Precision Movement:** Press the **Arrow keys** to move the crosshair pixel by pixel.
3. **Fast Movement:** Hold the **Shift key** while pressing the **Arrow keys** to jump in 10-pixel increments.
4. **Selection Movement:** If you have already started dragging a box, hold the **Spacebar** to move the entire selection area without changing its dimensions.

#### Summary Table
| Method | Key Combination | Movement Speed |
| :--- | :--- | :--- |
| Standard | Arrow Keys | 1 Pixel |
| Faster | **Shift + Arrow Keys** | 10 Pixels |

Using these shortcuts saves time and reduces the reliance on a mouse for pixel-perfect cropping.</noscript>
