                <!-- Content will be rendered here by marked -->
                <noscript>### Using the Pipe Symbol (|) in LDAP Filters

The pipe symbol `|` serves as the **logical OR** operator in LDAP (Lightweight Directory Access Protocol) search filters. It allows you to search for directory entries that match any one of multiple criteria.

#### Basic Syntax
The syntax for the OR operator follows a prefix notation where the operator precedes the components:
`(|(filter1)(filter2)(filter3)...)`

#### Practical Examples
1. **Searching for multiple usernames:**
   To find a user who has either the UID 'jdoe' or 'asmith':
   `(|(uid=jdoe)(uid=asmith))`

2. **Searching across different attributes:**
   To find entries where the common name is 'John' OR the email is 'john@example.com':
   `(|(cn=John)(mail=john@example.com))`

3. **Combining with Wildcards:**
   To find users whose surname starts with 'Sm' or 'Jo':
   `(|(sn=Sm*)(sn=Jo*))`

#### Advanced Usage: Nesting Operators
You can combine the OR operator (`|`) with the AND operator (`&`). For example, to find users who are in the 'Sales' department AND (either located in 'London' OR 'New York'):
`(&(department=Sales)(|(l=London)(l=New York)))`

#### Key Rules to Remember
- **Parentheses:** Every expression and every operator must be enclosed in parentheses. Failure to balance parentheses is the most common cause of LDAP filter errors.
- **Prefix Notation:** The operator always comes before the criteria it applies to.
- **Performance:** While the OR operator is powerful, including a high number of criteria in a single filter can impact directory performance.</noscript>
