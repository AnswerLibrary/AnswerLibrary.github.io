                <!-- Content will be rendered here by marked -->
                <noscript># How to Identify if an Unreachable VPN DNS is Slowing Your Internet

When you disconnect from a VPN, your computer is supposed to revert to your default ISP or local DNS settings. However, if the VPN software fails to clean up these settings, your system may continue trying to reach the VPN's private DNS servers. Since these servers are unreachable without an active tunnel, your browser will hang while waiting for a DNS timeout before falling back to a secondary server.

### 1. Check for 'Ghost' DNS Settings
Open your command-line interface (Command Prompt on Windows or Terminal on macOS/Linux) and run the following command:
- **Windows:** `ipconfig /all` (Look for the 'DNS Servers' section under your active adapter).
- **macOS/Linux:** `cat /etc/resolv.conf` or `networksetup -getdnsservers Wi-Fi`.

If you see IP addresses that do not belong to your router (e.g., 192.168.1.1) or a public provider like Google (8.8.8.8), and you are not currently connected to a VPN, those are likely leftover VPN DNS entries.

### 2. Perform an NSLookup Test
Type `nslookup google.com` in your terminal. Observe the first two lines of the output:
- **The Problem:** If the command hangs for several seconds before showing a result, or if the 'Server' listed is an IP address you don't recognize and it returns a 'DNS request timed out' error, your system is struggling with an unreachable DNS.
- **The Success:** If it returns the IP address of Google instantly using your router's IP, your DNS is working correctly.

### 3. Differentiate Latency from Bandwidth
If your download speeds (tested via Speedtest.net) are fast, but clicking a link takes 5-10 seconds to even start loading the page, this is a classic symptom of a DNS timeout. Use a 'Ping' command on a direct IP address (like `ping 1.1.1.1`). If the ping responds instantly but `ping google.com` hangs, the issue is strictly DNS-related.

### How to Fix It
1. **Flush DNS:** Run `ipconfig /flushdns` (Windows) or `sudo killall -HUP mDNSResponder` (macOS).
2. **Reset Adapter:** Go to your Network Settings and ensure 'Obtain DNS server address automatically' is selected.
3. **Restart VPN Service:** Sometimes simply opening and properly closing the VPN app will trigger the cleanup script.</noscript>
