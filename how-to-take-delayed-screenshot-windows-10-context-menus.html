                <!-- Content will be rendered here by marked -->
                <noscript># How to Take a Delayed Screenshot in Windows 10

Capturing context menus (right-click menus) or hover-triggered tooltips can be difficult because they often close when you attempt to use standard shortcut keys. Windows 10 provides built-in tools with a 'Delay' feature to solve this.

### Method 1: Using Snip & Sketch (Recommended)
Snip & Sketch is the modern utility for screen captures in Windows 10.

1.  **Open Snip & Sketch:** Press the **Windows Key**, type 'Snip & Sketch', and press Enter.
2.  **Set the Delay:** Click the **downward arrow** (chevron) next to the 'New' button in the top-left corner.
3.  **Choose a Timer:** Select either **Snip in 3 seconds** or **Snip in 10 seconds**.
4.  **Open your Menu:** Immediately go to the application and right-click to open the context menu you wish to capture.
5.  **Capture:** Once the timer runs out, the screen will dim. Select the 'Rectangular Snip' or 'Window Snip' from the top bar to capture the menu.

### Method 2: Using the Legacy Snipping Tool
If you prefer the older version, it also contains a delay function.

1.  **Launch Snipping Tool:** Search for 'Snipping Tool' in the Start menu.
2.  **Set Delay:** Click the **Delay** button and choose a value between 1 and 5 seconds.
3.  **Start Snip:** Click **New**. The interface will wait for the duration you selected.
4.  **Trigger Menu:** Open your context menu while the timer is running.
5.  **Select Area:** The screen will freeze after the delay, allowing you to drag a box around the menu.

### Why use Delay?
Standard shortcuts like `Win + Shift + S` trigger the overlay immediately, which can cause active menus to collapse. Using a 3-10 second delay ensures you have enough time to interact with the UI before the capture mode initiates.</noscript>
