                <noscript># How to Repair Bluetooth Radio Drivers on Windows 10 Home

If you are experiencing connectivity issues, follow these steps to repair your Bluetooth radio drivers:

### 1. Update Drivers via Device Manager
1. Right-click the **Start** button and select **Device Manager**.
2. Expand the **Bluetooth** section by clicking the arrow next to it.
3. Right-click your Bluetooth adapter (e.g., "Intel(R) Wireless Bluetooth") and select **Update driver**.
4. Select **Search automatically for updated driver software** and follow the prompts.

### 2. Reinstall the Bluetooth Driver
1. In **Device Manager**, right-click your Bluetooth adapter and select **Uninstall device**.
2. Click **Uninstall** (do not check the box to delete driver software unless troubleshooting persists).
3. Restart your computer. Windows will automatically attempt to reinstall the driver upon reboot.

### 3. Run the Windows Troubleshooter
1. Go to **Settings** > **Update & Security** > **Troubleshoot**.
2. Click **Additional troubleshooters**.
3. Select **Bluetooth** and click **Run the troubleshooter**. Follow the on-screen instructions to fix detected issues.

### 4. Restart Bluetooth Services
1. Press `Win + R`, type `services.msc`, and hit Enter.
2. Find **Bluetooth Support Service**.
3. Right-click it and select **Restart**.
4. Double-click it and ensure the **Startup type** is set to **Automatic**.

### 5. Download Drivers from Manufacturer Website
If the above steps fail, visit the support website of your PC manufacturer (like Dell, HP, or Lenovo) or the radio manufacturer (like Intel or Realtek). Search for your specific model, download the latest Bluetooth driver, and install it manually.</noscript>
