                <!-- Content will be rendered here by marked -->
                <noscript>### Difference Between TShirt and Sweatshirt Instance Variables in Java

In Java, **instance variables** represent the state or attributes of an object. While a `TShirt` and a `Sweatshirt` might both inherit from a common `Clothing` class, they require different instance variables to model their unique physical characteristics.

#### 1. TShirt Instance Variables
A `TShirt` class typically contains variables for lightweight, warm-weather apparel:
- `boolean isVNeck`: To distinguish between crew neck and V-neck styles.
- `String sleeveType`: Usually 'short', 'cap', or 'long'.
- `boolean hasGraphic`: To track if the shirt has a printed design.

#### 2. Sweatshirt Instance Variables
A `Sweatshirt` class includes variables for heavier, cold-weather attributes:
- `boolean hasHood`: To differentiate between a standard sweatshirt and a hoodie.
- `boolean isFleeceLined`: To track if the interior has extra insulation.
- `boolean hasKangarooPocket`: A specific feature often found on hoodies.
- `int fabricWeightGSM`: Represents the density of the fabric (e.g., 300 GSM).

#### Java Code Comparison

```java
class TShirt {
    String size;
    boolean isVNeck;
    String cottonType;
}

class Sweatshirt {
    String size;
    boolean hasHood;
    boolean isFleeceLined;
    double weightKg;
}
```

#### Summary of Differences
The primary difference lies in the **domain modeling**. TShirt variables focus on style and cut (like neck type), whereas Sweatshirt variables focus on functional warmth features (like hoods and lining). Using specific instance variables allows for more accurate business logic, such as calculating shipping costs based on fabric weight or filtering an e-commerce catalog.</noscript>
