                <!-- Content will be rendered here by marked -->
                <noscript># How to Register on the Electronic Project Management System (e-PMS) for DST Grants

The Electronic Project Management System (e-PMS), managed by the Department of Science and Technology (DST), is the primary portal for researchers to submit proposals and track grant status online. Registration as a Principal Investigator (PI) is the first mandatory step.

### 1. Visit the Official Portal
Navigate to the official DST e-PMS website at [onlinedst.gov.in](https://onlinedst.gov.in/). It is recommended to use an updated browser like Google Chrome or Mozilla Firefox for compatibility.

### 2. Initiate PI Registration
On the homepage, locate the sidebar or main menu and click on the **'New PI Registration'** link. This will open the registration form for individual investigators.

### 3. Fill in Personal and Professional Details
Provide the following information accurately:
- **Basic Information:** Full name, gender, date of birth, and category.
- **Contact Details:** A valid email address and mobile number. These are critical for receiving OTPs and notifications.
- **Institutional Affiliation:** Search for your host institution from the dropdown menu. If your institution is not listed, you must contact the e-PMS helpdesk to get the institution registered before you can proceed.

### 4. Create Login Credentials
Select a unique username and a strong password. You will use these for all future grant submissions and progress reports.

### 5. Verification and Activation
After submitting the registration form, you will receive a verification link or a temporary password via your registered email. Click the link to activate your account and log in for the first time.

### 6. Complete Your Researcher Profile
Once logged in, go to the 'Profile' section. You must fill in detailed information regarding your:
- Academic qualifications
- Research expertise and specialized areas
- Previous research experience and publications
- Current employment status

### Essential Tips
- **Keep Documents Ready:** Have a scanned copy of your institutional ID and an updated CV ready for upload if required.
- **Browser Cache:** If you face issues with the form loading, clear your browser cache or try an incognito window.
- **Helpdesk:** If you encounter technical glitches, use the 'Contact Us' section on the portal to reach the DST technical team.</noscript>
