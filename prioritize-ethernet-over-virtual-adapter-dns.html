                <!-- Content will be rendered here by marked -->
                <noscript>### Prioritizing Ethernet for DNS Traffic

When multiple network adapters (physical and virtual) are active, your operating system uses a priority system to determine which connection to use for DNS queries. To ensure your Ethernet connection takes precedence over virtual adapters (like those from VPNs, VMware, or VirtualBox), follow these steps:

#### 1. Windows: Adjust Interface Metric
Windows uses an 'Interface Metric' to determine priority. A lower value indicates a higher priority for the adapter.

1. Press **Win + R**, type `ncpa.cpl`, and hit **Enter**.
2. Right-click your **Ethernet** adapter and select **Properties**.
3. Select **Internet Protocol Version 4 (TCP/IPv4)** and click **Properties**.
4. Click **Advanced**.
5. Uncheck **Automatic metric**.
6. Enter a low number (e.g., `10`) in the **Interface metric** box.
7. Repeat these steps for your virtual adapters, but set a higher metric (e.g., `100`).
8. Restart the adapter or your computer to apply the changes.

#### 2. macOS: Change Service Order
On macOS, priority is managed by the physical order of services in the network list.

1. Go to **System Settings** > **Network**.
2. Click the **three-dot icon** (or the gear icon in older versions) and select **Set Service Order**.
3. Drag **Ethernet** to the very top of the list.
4. Click **OK** and then **Apply**.

#### 3. Verification
You can verify which adapter is being prioritized for DNS by running `nslookup` or checking the full network configuration via `ipconfig /all` (Windows) or `scutil --dns` (macOS) in the terminal.</noscript>
