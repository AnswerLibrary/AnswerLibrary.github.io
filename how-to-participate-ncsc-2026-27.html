                <noscript># Participating in the National Children's Science Congress 2026-27\n\nThe National Children's Science Congress (NCSC) is a prestigious program for young scientists across India. It provides a platform for children to apply scientific methods to solve local problems. Follow these steps to participate in the 2026-27 session.\n\n### 1. Eligibility Criteria\n- **Age Group:** The program is open to children between the ages of 10 and 17.\n- **Categories:** Junior (10–14 years) and Senior (14–17 years) as of December 31, 2026.\n- **Team Composition:** Usually, projects are submitted by a team of two students (a group leader and a member) under the guidance of a teacher or mentor.\n\n### 2. Understand the Theme\nEvery two years, the Department of Science and Technology (DST) announces a 'Focal Theme' and several 'Sub-themes'. For 2026-27, the theme typically focuses on sustainability, local ecosystems, or health. Ensure your project aligns closely with these official guidelines.\n\n### 3. Step-by-Step Participation Process\n- **Project Selection:** Identify a problem in your local area (school, village, or town). Use the scientific method—observation, hypothesis, experimentation, and conclusion—to address it.\n- **Maintain a Logbook:** Document your daily progress, observations, and raw data in a project logbook. This is a mandatory requirement for evaluation.\n- **Registration:** Contact your school's science department or the District Coordinator for NCSC in your region. Registration forms are typically distributed through schools or state science councils starting in mid-2026.\n- **Project Report:** Prepare a detailed report (English or a regional language) following the standard NCSC format, including title, objective, methodology, results, and conclusion.\n\n### 4. Levels of Competition\n1. **District Level:** This is the first stage where you present your project to a panel of experts. Selected projects move to the state level.\n2. **State Level:** Compete against the best projects from other districts. Successful teams represent their state at the national level.\n3. **National Level:** The final stage where young scientists from all over India showcase their innovations. This usually takes place in late December 2026 or early January 2027.\n\n### 5. Tips for Success\n- **Originality:** Focus on unique, local solutions rather than copying generic internet projects.\n- **Scientific Temper:** Judges value how well you followed the scientific process more than the complexity of the equipment used.\n- **Presentation:** Practice your presentation skills and be prepared to answer technical questions from the evaluators.</noscript>
            </div>
