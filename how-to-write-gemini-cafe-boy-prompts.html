                <!-- Content will be rendered here by marked -->
                <noscript>### Master Gemini Prompts for Cafe Aesthetic Photo Edits

Writing effective prompts for Google Gemini (or any AI image generator) requires a mix of descriptive detail and atmospheric keywords. To get the perfect "boy in a cafe" look, follow these steps:

#### 1. Define the Subject and Action
Start with the core of the image. Instead of just saying "a boy," describe his appearance and what he is doing to add character.
* **Example:** "A young man with messy brown hair wearing an oversized cream sweater, sitting at a wooden table."

#### 2. Set the Cafe Atmosphere
The "vibe" of the cafe changes the entire photo. Use specific keywords for the interior design:
* **Industrial:** "Exposed brick walls, metal pipes, and large warehouse-style windows."
* **Cozy/Rustic:** "Warm wooden textures, bookshelves, hanging ivy plants, and soft yellow ambient lighting."
* **Modern/Minimalist:** "White marble tables, sleek black chairs, and bright, clean aesthetics."

#### 3. Focus on Lighting and Camera Angles
Lighting is the most important factor for realism and mood.
* **Golden Hour:** "Soft, warm sunlight streaming through a window hitting the subject's face."
* **Cinematic:** "Deep shadows, moody atmosphere, and high contrast."
* **Depth of Field:** Use terms like "bokeh" or "blurred background" to ensure the subject stands out from the busy cafe environment.

#### 4. The Prompt Formula
A winning prompt structure looks like this: **[Subject Description] + [Action/Pose] + [Setting/Background] + [Lighting & Mood] + [Technical Quality].**

#### Example Prompts to Try:
* **The Cozy Reader:** "A realistic photo of a teenage boy in a cable-knit sweater reading a book in a cozy cafe, a steaming cup of coffee on the table, warm afternoon light, highly detailed, 8k resolution."
* **The Urban Freelancer:** "Wide shot of a stylish young man working on a laptop in a modern industrial cafe, rainy day visible through the window, cool blue tones, cinematic lighting, street photography style."
* **Candid Aesthetic:** "A candid, grainy film-style photo of a boy laughing while holding a matcha latte, vintage cafe decor, 90s aesthetic, Kodak Portra 400 vibe."

#### Pro-Tips for Better Results:
* **Specify Perspective:** Use phrases like "Close-up shot," "Eye-level view," or "View from across the table."
* **Clothing Details:** Don't forget to mention textures like "leather jacket," "linen shirt," or "beanie" to help the AI render realistic fabrics.</noscript>
