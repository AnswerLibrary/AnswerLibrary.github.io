      "text": "How to Remove a Persistent DNS Server from a Hyper-V Internal Network. Persistent DNS server settings on a Hyper-V internal network usually reside on the virtual network adapter created on the host machine. To remove these settings, follow these steps:   Method 1: Using PowerShell (Recommended)  1. Open PowerShell as an Administrator.  2. Identify the interface name by running: Get-NetIPInterface. Look for the alias starting with 'vEthernet'.  3. Use the following command to reset the DNS: Set-DnsClientServerAddress -InterfaceAlias 'vEthernet (YourSwitchName)' -ResetServerAddresses.  4. Verify the change using Get-DnsClientServerAddress.   Method 2: Network Adapter Settings  1. Go to Control Panel > Network and Sharing Center > Change adapter settings.  2. Right-click the 'vEthernet (Internal Switch)' adapter and select Properties.  3. Select 'Internet Protocol Version 4 (TCP/IPv4)' and click Properties.  4. Choose 'Obtain DNS server address automatically' to clear persistent manual entries.   Method 3: Clear DNS Cache  Run ipconfig /flushdns in the command prompt to ensure old records are cleared from the resolver cache. This process ensures the Hyper-V internal network relies on your primary network's DNS or DHCP-provided values."

                <!-- Content will be rendered here by marked -->
                <noscript>### How to Remove a Persistent DNS Server from a Hyper-V Internal Network. Persistent DNS server settings on a Hyper-V internal network usually reside on the virtual network adapter created on the host machine. To remove these settings, follow these steps:  #### Method 1: Using PowerShell (Recommended)  1. Open PowerShell as an Administrator.  2. Identify the interface name by running: `Get-NetIPInterface`. Look for the alias starting with 'vEthernet'.  3. Use the following command to reset the DNS: `Set-DnsClientServerAddress -InterfaceAlias 'vEthernet (YourSwitchName)' -ResetServerAddresses`.  4. Verify the change using `Get-DnsClientServerAddress`.  #### Method 2: Network Adapter Settings  1. Go to Control Panel > Network and Sharing Center > Change adapter settings.  2. Right-click the 'vEthernet (Internal Switch)' adapter and select Properties.  3. Select 'Internet Protocol Version 4 (TCP/IPv4)' and click Properties.  4. Choose 'Obtain DNS server address automatically' to clear persistent manual entries.  #### Method 3: Clear DNS Cache  Run `ipconfig /flushdns` in the command prompt to ensure old records are cleared from the resolver cache. This process ensures the Hyper-V internal network relies on your primary network's DNS or DHCP-provided values.</noscript>
            </div>
