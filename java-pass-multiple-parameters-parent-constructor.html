                <noscript>In Java, you pass multiple parameters to a parent class constructor using the `super()` keyword. This call must be the **first statement** inside the child class constructor.

### Steps to Pass Parameters:
1. Define a constructor in the parent class that accepts the required parameters.
2. In the child class constructor, invoke `super(arg1, arg2, ...)` passing the values required by the parent.

### Code Example:
```java
class Vehicle {
    String brand;
    int year;

    // Parent constructor with two parameters
    Vehicle(String brand, int year) {
        this.brand = brand;
        this.year = year;
    }
}

class Car extends Vehicle {
    String model;

    // Child constructor
    Car(String brand, int year, String model) {
        // Passing parameters to the parent constructor using super
        super(brand, year);
        this.model = model;
    }

    void displayInfo() {
        System.out.println("Brand: " + brand + ", Year: " + year + ", Model: " + model);
    }
}

public class Main {
    public static void main(String[] args) {
        Car myCar = new Car("Toyota", 2022, "Camry");
        myCar.displayInfo();
    }
}
```

### Key Rules to Remember:
* **Order Matters**: The `super()` call must be the very first line of the child constructor.
* **Signature Matching**: The number and type of arguments passed to `super()` must match one of the constructors defined in the parent class.
* **Mandatory Call**: If the parent class does not have a default (no-argument) constructor, the child class is required to explicitly call a parent constructor using `super()`.
* **Single Call**: You can only call one parent constructor per child constructor execution.</noscript>
