                <noscript># How to find the Directory of Administrative Setup for the Department of Science & Technology

The Department of Science & Technology (DST), a key department under the Ministry of Science and Technology in India, maintains an updated directory of its administrative hierarchy and personnel to ensure transparency and accessibility for citizens and researchers.

### Steps to Locate the Directory Online

To find the official Directory of Administrative Setup and contact information for DST officials, follow these steps:

1. **Access the Official Portal**: Visit the official website of the Department of Science & Technology at [https://dst.gov.in](https://dst.gov.in).
2. **Navigate to 'About Us'**: Hover over or click on the "About Us" section in the primary navigation menu at the top of the homepage.
3. **Select 'Who's Who'**: Within the dropdown or sub-menu, click on the **"Who's Who"** link. This section contains the names, designations, and official contact details of the administrative and scientific staff.
4. **Check the RTI Section**: For a more formal breakdown of the administrative structure and employee lists, go to the **"RTI"** (Right to Information) section. Under **"Information under Section 4(1)(b) of the RTI Act"**, you will find detailed documents regarding the organization's functions, duties, and its directory.
5. **Use the Internal Search**: If you are looking for a specific officer or division, use the search bar located at the top right of the website and enter keywords like "Telephone Directory" or "Administrative Directory."

### Key Contact Details for the Department

If you are unable to access the website, the primary administrative hub for DST is located at:

* **Address**: Technology Bhavan, New Mehrauli Road, New Delhi – 110 016.
* **General EPABX**: +91-11-26567373, 26562133, 26562144.

### Importance of the Directory

The directory is essential for stakeholders, students, and scientists who wish to enquire about research grants, fellowship statuses, or policy guidelines. It provides the direct line of communication to the relevant desks managing various scientific schemes.</noscript>
