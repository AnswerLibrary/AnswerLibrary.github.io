                <!-- Content will be rendered here by marked -->
                <noscript># How to Fix Slow DNS Resolution on Ethernet and LTE

When slow DNS resolution occurs across both Ethernet and LTE connections, the problem is likely localized to your device's configuration or software rather than the network itself. Since these are two distinct connection types, a common bottleneck is usually the system-wide DNS settings or network stack. Follow these steps to resolve the issue:

### 1. Switch to a High-Performance Public DNS
By default, your device uses DNS servers provided by your ISP (for Ethernet) and your mobile carrier (for LTE). These can often be slow or poorly optimized. Manually setting a global DNS provider can significantly reduce latency.
- **Cloudflare DNS:** 1.1.1.1 and 1.0.0.1
- **Google Public DNS:** 8.8.8.8 and 8.8.4.4
- **Quad9:** 9.9.9.9

### 2. Flush Your DNS Cache
Invalid or corrupted DNS cache entries can cause your browser to 'hang' while trying to find an IP address.
- **Windows:** Open Command Prompt as Administrator and run `ipconfig /flushdns`.
- **macOS:** Open Terminal and run `sudo dscacheutil -flushcache; sudo killall -HUP mDNSResponder`.
- **Mobile:** The easiest way to flush DNS on Android or iOS is to toggle **Airplane Mode** on for 10 seconds and then off.

### 3. Disable IPv6
Sometimes, a device attempts to resolve a DNS query over IPv6 first. If the network or the DNS server has poor IPv6 support, the request will time out before falling back to IPv4, causing a noticeable delay. Try disabling IPv6 in your network adapter properties to see if speeds improve.

### 4. Check for VPN or Security Software Interference
VPNs and third-party antivirus 'web shields' often reroute DNS queries through their own encrypted tunnels. If their servers are congested, your resolution speed will drop. Disable any VPN, firewall, or third-party security suite temporarily to isolate the cause.

### 5. Perform a Network Reset
If the issue persists, your operating system's network stack may be glitched. Use the **Network Reset** option found in the Windows Settings or macOS System Settings. This will reinstall network adapters and reset all networking components to their factory defaults, clearing any deep-seated configuration errors.</noscript>
