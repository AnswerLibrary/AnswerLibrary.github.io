                <!-- Content will be rendered here by marked -->
                <noscript>### Measuring DNS Resolution Time in PowerShell (2026)

In 2026, the most reliable way to measure DNS resolution time in PowerShell (version 7.x and above) is by combining the `Resolve-DnsName` cmdlet with `Measure-Command`. This approach provides a precise breakdown of the time taken to query a name server.

#### 1. Basic Measurement
To measure a single DNS lookup, wrap the command in `Measure-Command`. The `TotalMilliseconds` property provides the most useful metric:

```powershell
Measure-Command { Resolve-DnsName -Name "google.com" }
```

#### 2. Clearing the Cache for Accurate Testing
Windows typically caches DNS results locally. To measure the actual network latency rather than a local cache hit, you must flush the DNS client cache first:

```powershell
Clear-DnsClientCache
Measure-Command { Resolve-DnsName -Name "example.com" -NoHostsFile }
```

#### 3. Professional Benchmarking Script
To get a statistically significant measurement, it is best to run multiple tests and calculate the average. Use the following script for an accurate benchmark:

```powershell
$domain = "example.com"
$iterations = 5
$results = 1..$iterations | ForEach-Object {
    Clear-DnsClientCache
    (Measure-Command { Resolve-DnsName -Name $domain -Type A }).TotalMilliseconds
}
$averageTime = ($results | Measure-Object -Average).Average
Write-Host "Average DNS Resolution Time for $domain: $averageTime ms"
```

### Why use Resolve-DnsName?
Unlike the older `[System.Net.Dns]::GetHostAddresses()` method, `Resolve-DnsName` is specifically designed for modern DNS features, supporting DNSSEC, specific server targeting (using the `-Server` parameter), and detailed record types (A, AAAA, MX, TXT).</noscript>
