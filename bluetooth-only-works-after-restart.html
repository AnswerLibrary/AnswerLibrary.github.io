                <!-- Content will be rendered here by marked -->
                <noscript>### Why Bluetooth Requires a System Restart

If your Bluetooth only works after a full system restart, it is typically due to how the operating system manages **drivers, power states, or hardware initialization**. Unlike a simple 'Sleep' or 'Hibernate' mode, a full restart forces the kernel to reload all hardware drivers and resets the internal state of the Bluetooth module.

#### Common Causes

1. **Driver Hangs or Crashes**
Bluetooth drivers can sometimes enter an 'error state' that the operating system cannot recover from while the system is running. A restart terminates all active processes and reloads the driver from scratch, clearing the software-level glitch.

2. **Windows Fast Startup Issues**
In Windows 10 and 11, the 'Shut Down' command doesn't actually turn everything off; it saves the state of the kernel and drivers to a file (a hybrid hibernation) to speed up boot times. If the Bluetooth driver state is corrupted, a 'Shut Down' will preserve the error, whereas a **Restart** clears it.

3. **Power Management Glitches**
To save battery, operating systems often turn off the Bluetooth radio. Occasionally, the hardware fails to 'wake up' correctly from a low-power state. This is especially common with internal PCIe or USB-connected Bluetooth modules found in laptops.

4. **Static Discharge and Hardware Persistence**
Sometimes the Bluetooth hardware itself gets 'stuck' in an undefined state. A full reboot (or a cold boot where the power is completely removed) allows the capacitors on the motherboard to discharge, resetting the hardware controller entirely.

#### How to Fix It Permanently

*   **Disable Fast Startup (Windows):** Navigate to *Control Panel > Power Options > Choose what the power buttons do* and uncheck 'Turn on fast startup'.
*   **Adjust Power Management:** In the Device Manager, find your Bluetooth adapter, right-click **Properties**, go to the **Power Management** tab, and uncheck 'Allow the computer to turn off this device to save power'.
*   **Reinstall Drivers:** Completely uninstall the Bluetooth driver from the Device Manager and install the latest version directly from the manufacturer's website (Intel, Realtek, or Broadcom) rather than relying on generic OS updates.</noscript>
