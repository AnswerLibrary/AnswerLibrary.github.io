                <noscript>### Understanding Variable Shadowing in Java Inheritance

In Java, **variable shadowing** (often referred to as **field hiding**) occurs when a subclass declares a variable with the exact same name as a variable in its superclass. 

Unlike methods, variables in Java are **not polymorphic**. This means that the variable accessed depends on the **reference type** determined at compile-time, rather than the actual object type at runtime.

#### Example of Variable Shadowing

```java
class Parent {
    int value = 10;
}

class Child extends Parent {
    int value = 20; // This shadows Parent.value
}

public class Main {
    public static void main(String[] args) {
        Parent obj = new Child();
        System.out.println(obj.value); // Prints 10 (Reference type is Parent)

        Child childObj = new Child();
        System.out.println(childObj.value); // Prints 20 (Reference type is Child)
    }
}
```

#### How to Avoid Variable Shadowing

Shadowing often leads to confusing code and accidental bugs. Here are the best practices to avoid or manage it:

1. **Unique Naming**: The most effective way to avoid shadowing is to ensure that subclass fields have unique names that do not clash with inherited fields.
2. **Use the `super` Keyword**: If you must access the parent's version of a shadowed variable within the subclass, use the `super` keyword (e.g., `super.value`).
3. **Encapsulation (Private Fields)**: Declare fields as `private` and provide `public` getter and setter methods. Since methods support **overriding** (polymorphism), calling `obj.getValue()` will return the child's value regardless of the reference type, ensuring consistent behavior.
4. **Follow Clean Code Principles**: Generally, a subclass should extend the state of the parent, not redefine it. If a subclass needs to change a parent's value, it should modify the existing field rather than declaring a new one.</noscript>
