                <!-- Content will be rendered here by marked -->
                <noscript># Major Labour Reforms in Independent India (2026 Update)

As of 2026, the landscape of Indian labour law has undergone its most significant transformation since independence through the implementation of the **Four Labour Codes**. These codes consolidated 29 central labour laws into a streamlined, four-part framework designed to balance industrial growth with worker welfare.

### 1. The Code on Wages (2019)
This reform universalized the right to minimum wages and timely payment for all workers, regardless of the sector or wage ceiling. It introduced the 'Floor Wage' concept, ensuring that states cannot set minimum wages below a federally mandated level, thereby reducing regional disparities.

### 2. The Industrial Relations Code (2020)
This code was designed to boost the 'Ease of Doing Business' by allowing firms with up to 300 workers to hire and fire without prior government permission (increased from the previous limit of 100). It also introduced a 'Worker Reskilling Fund' to support employees who are laid off.

### 3. The Code on Social Security (2020)
A landmark shift in Indian policy, this code extended social security benefits to **gig workers and platform workers** for the first time. By creating a dedicated Social Security Fund, the government has aimed to provide health, disability, and old-age benefits to the vast unorganized sector.

### 4. The Occupational Safety, Health and Working Conditions Code (2020)
This code modernized safety standards and simplified compliance by replacing 13 different acts. It introduced 'One Nation, One Registration' for businesses and formalized the rights of inter-state migrant workers, ensuring they receive travel allowances and access to public distribution systems.

### Key Impacts by 2026
These reforms have significantly reduced the 'Inspector Raj' by introducing web-based inspections and randomized audits. For the workforce, the reforms have accelerated the transition from informal to formal employment, providing millions of workers with legal protections and structured benefits for the first time.</noscript>
