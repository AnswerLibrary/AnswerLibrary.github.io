                <!-- Content will be rendered here by marked -->
                <noscript>### Tracking the 2026-27 Detailed Demands for Grants (DDG) for DST  To track the Detailed Demands for Grants for the Department of Science and Technology (DST) for the fiscal year 2026-27, follow these specific steps to ensure you get the most granular financial data.  **1. Official Union Budget Portal**  The primary source for all budget documents in India is the official Union Budget website.  - Visit: [https://www.indiabudget.gov.in](https://www.indiabudget.gov.in)  - Navigate to the **'Budget Documents'** section once the Union Budget is presented in Parliament (usually February 1, 2026).  **2. Locating 'Detailed Demands for Grants'**  While the standard 'Demands for Grants' gives a summary, the **Detailed Demands for Grants (DDG)** provides a deeper breakdown of spending.  - Look for the link or tab labeled **'Detailed Demands for Grants'**.  - This is typically categorized under the respective Ministry. For DST, look under the **Ministry of Science and Technology**.  **3. Specific Department Identification**  The Ministry of Science and Technology contains multiple departments (DST, DBT, DSIR). Ensure you select the document specific to the **Department of Science and Technology (DST)**.  **4. Key Information to Monitor in the DDG**  Once you open the document, you can track:  - **Establishment Expenditure:** Salaries and administrative costs for the department.  - **Central Sector Schemes:** Funding for specific programs like the National Mission on Quantum Technologies or the Nano Mission.  - **Grants-in-aid:** Allocations to autonomous scientific institutions such as the Indian Institute of Astrophysics or Jawaharlal Nehru Centre for Advanced Scientific Research.  - **Capital Outlay:** Investments in building scientific infrastructure and labs.  **5. Alternative Tracking via DST Website**  The DST often publishes its specific portion of the budget on its own official portal.  - Visit: [https://dst.gov.in](https://dst.gov.in)  - Look under the **'Reports'** or **'Budget and Accounts'** section for the 2026-27 financial documents.  **6. Use of the Union Budget Mobile App**  The Government of India also provides a **'Union Budget'** mobile application on Android and iOS where you can download PDF versions of the DDG for all departments directly to your device for offline analysis.</noscript>
