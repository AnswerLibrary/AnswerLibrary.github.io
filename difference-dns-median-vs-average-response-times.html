                <!-- Content will be rendered here by marked -->
                <noscript>### Understanding DNS Performance Metrics: Median vs. Average

When monitoring DNS performance, two common metrics are used to measure latency: **Average (Mean)** and **Median (P50)**. Understanding the difference is crucial for accurately assessing network health.

#### 1. Average (Mean) Response Time
The average is calculated by adding all DNS response times together and dividing by the total number of requests. 
- **Pros:** It provides a general overview of the total system load.
- **Cons:** It is highly sensitive to **outliers**. A few extremely slow requests (due to timeouts or packet loss) can significantly inflate the average, misrepresenting the performance experienced by the majority of users.

#### 2. Median (P50) Response Time
The median is the middle value when all response times are sorted from fastest to slowest. 
- **Pros:** It represents the **typical user experience**. Since it focuses on the middle of the data set, it effectively ignores extreme outliers.
- **Cons:** It does not capture how bad the worst-case scenarios are for users in the higher percentiles.

#### Summary of Key Differences
| Feature | Average (Mean) | Median (P50) |
| :--- | :--- | :--- |
| **Calculation** | Sum / Total Count | Middle Value |
| **Outlier Impact** | High | Low |
| **Use Case** | Capacity Planning | User Experience Analysis |

#### Which one should you use?
In DNS monitoring, **Median** is generally preferred because DNS latency often follows a "long tail" distribution. To get a complete picture, engineers typically monitor the Median for typical performance and the **P95 or P99 (95th/99th percentile)** to understand the performance of the slowest requests.</noscript>
