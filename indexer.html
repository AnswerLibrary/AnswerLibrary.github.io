<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسرع أرشفة Answer Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col justify-between">

    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400 mb-2">مسرع الأرشفة لـ Answer Library</h1>
            <p class="text-gray-400 text-sm">أداة مخصصة تعمل مباشرة عبر المتصفح لإرسال روابط موقعك لمحركات البحث</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- إدخال الروابط -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-md">
                    <label class="block text-sm font-semibold mb-2 text-gray-300">أدخل الروابط المراد أرشفتها (رابط واحد لكل سطر):</label>
                    <textarea id="urls" rows="8" class="w-full bg-gray-950 border border-gray-700 rounded p-3 text-sm focus:outline-none focus:border-blue-500 text-left ltr" placeholder="https://answerlibrary.github.io/page-name"></textarea>
                </div>

                <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-md grid grid-cols-2 gap-4">
                    <label class="flex items-center space-x-3 space-x-reverse cursor-pointer p-3 bg-gray-900 rounded border border-gray-700">
                        <input type="checkbox" id="use_google" class="form-checkbox text-blue-500 h-5 w-5">
                        <span class="text-sm font-semibold">تفعيل Google</span>
                    </label>
                    <label class="flex items-center space-x-3 space-x-reverse cursor-pointer p-3 bg-gray-900 rounded border border-gray-700">
                        <input type="checkbox" id="use_indexnow" checked class="form-checkbox text-blue-500 h-5 w-5">
                        <span class="text-sm font-semibold">تفعيل Bing / Yandex</span>
                    </label>
                </div>

                <button onclick="startIndexing()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200 shadow-lg">
                    إرسال لطلب الأرشفة
                </button>
            </div>

            <!-- الإعدادات والنتائج -->
            <div class="space-y-6">
                <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-md">
                    <h3 class="text-md font-semibold mb-4 border-b border-gray-700 pb-2 text-blue-400">بيانات التوثيق</h3>
                    
                    <!-- IndexNow -->
                    <div class="mb-4">
                        <label class="block text-xs font-semibold mb-1 text-gray-400">مفتاح IndexNow:</label>
                        <input type="text" id="indexnow_key" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-xs ltr" placeholder="مثال: 9f7b4c...">
                    </div>
                    <div class="mb-4">
                        <label class="block text-xs font-semibold mb-1 text-gray-400">رابط موقعك (ثابت لـ GitHub):</label>
                        <input type="text" id="host_url" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-xs ltr" value="https://answerlibrary.github.io" readonly>
                    </div>

                    <!-- Google Token -->
                    <div class="mb-2">
                        <label class="block text-xs font-semibold mb-1 text-gray-400">رمز Google Access Token:</label>
                        <input type="text" id="google_token" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-xs ltr" placeholder="ya29.a0AfH6SM...">
                    </div>
                </div>

                <!-- شاشة المراقبة -->
                <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-md">
                    <h3 class="text-md font-semibold mb-2 border-b border-gray-700 pb-2 text-green-400">حالة الطلبات</h3>
                    <div id="logs" class="h-40 overflow-y-auto text-xs bg-gray-950 p-3 rounded border border-gray-800 space-y-1 font-mono text-left ltr">
                        <div class="text-gray-500">في انتظار إدخال الروابط...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 border-t border-gray-800 text-xs text-gray-500">
        أداة الأرشفة المباشرة لموقع Answer Library
    </footer>

    <script>
        async function startIndexing() {
            const urlsInput = document.getElementById('urls').value.trim();
            const useGoogle = document.getElementById('use_google').checked;
            const useIndexNow = document.getElementById('use_indexnow').checked;
            const indexNowKey = document.getElementById('indexnow_key').value.trim();
            const hostUrl = document.getElementById('host_url').value.trim();
            const googleToken = document.getElementById('google_token').value.trim();
            const logsDiv = document.getElementById('logs');

            if (!urlsInput) {
                alert('يرجى كتابة رابط واحد على الأقل.');
                return;
            }

            const urls = urlsInput.split('\n').map(url => url.trim()).filter(url => url.length > 0);
            logsDiv.innerHTML = '';
            addLog('بدء إرسال الروابط...', 'info');

            // 1. طلبات Bing / Yandex
            if (useIndexNow) {
                if (!indexNowKey) {
                    addLog('خطأ: يرجى إدخال مفتاح IndexNow الخاص بموقعك أولاً.', 'error');
                } else {
                    addLog('إرسال لـ Bing / Yandex عبر بروتوكول IndexNow...', 'info');
                    const payload = {
                        host: "answerlibrary.github.io",
                        key: indexNowKey,
                        keyLocation: `${hostUrl}/${indexNowKey}.txt`,
                        urlList: urls
                    };

                    try {
                        await fetch('https://api.indexnow.org/IndexNow', {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json; charset=utf-8' },
                            body: JSON.stringify(payload)
                        });
                        addLog('تم دفع الروابط لـ IndexNow بنجاح.', 'success');
                    } catch (e) {
                        addLog('خطأ أثناء إرسال طلب IndexNow.', 'error');
                    }
                }
            }

            // 2. طلبات Google Indexing API
            if (useGoogle) {
                if (!googleToken) {
                    addLog('خطأ: يرجى إضافة رمز Google Access Token للتشغيل المباشر.', 'error');
                } else {
                    addLog('بدء الإرسال لـ Google API...', 'info');
                    for (const url of urls) {
                        try {
                            const response = await fetch('https://indexing.googleapis.com/v3/urlNotifications:publish', {
                                method: 'POST',
                                headers: {
                                    'Authorization': `Bearer ${googleToken}`,
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({ url: url, type: 'URL_UPDATED' })
                            });

                            const data = await response.json();
                            if (response.ok) {
                                addLog(`جوجل: تم إرسال الرابط بنجاح: ${url}`, 'success');
                            } else {
                                addLog(`جوجل: خطأ في الرابط ${url} - ${data.error ? data.error.message : 'غير معروف'}`, 'error');
                            }
                        } catch (e) {
                            addLog(`جوجل: خطأ في الاتصال بالشبكة لـ ${url}`, 'error');
                        }
                    }
                }
            }
        }

        function addLog(message, type) {
            const logsDiv = document.getElementById('logs');
            let color = 'text-blue-400';
            if (type === 'success') color = 'text-green-400';
            if (type === 'error') color = 'text-red-400';
            logsDiv.innerHTML += `<div class="${color}">[${new Date().toLocaleTimeString()}] ${message}</div>`;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
    </script>
</body>
</html>
