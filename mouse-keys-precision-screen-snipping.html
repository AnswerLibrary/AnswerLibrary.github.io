                <!-- Content will be rendered here by marked -->
                <noscript>### Using Mouse Keys for Precision Screen Snipping

Windows Mouse Keys is a powerful accessibility feature that allows you to control your cursor using your keyboard's numeric keypad. This is particularly useful for precision screen snipping when you need to capture a specific region down to the pixel where a standard mouse might be too jittery.

#### Step 1: Enable Mouse Keys
1. Press `Win + I` to open **Settings**.
2. Navigate to **Ease of Access** (or **Accessibility** on Windows 11).
3. Select **Mouse** from the interaction section.
4. Toggle the switch for **Control your mouse with a keypad** to **On**.
5. Ensure **Only use Mouse Keys when Num Lock is on** is checked (or unchecked, depending on your preference).

#### Step 2: Configure for Maximum Precision
To get the most out of this tool for snipping, adjust these settings:
- **Pointer speed**: Keep the initial speed low.
- **Hold the Ctrl key to speed up and the Shift key to slow down**: Ensure this is checked. The **Shift** key is the secret to pixel-perfect movements.

#### Step 3: Performing the Precision Snip
1. Press `Win + Shift + S` to initiate the Windows Snip & Sketch (Snipping Tool).
2. Use the **NumPad** keys (2, 4, 6, 8) to move your cursor to the starting corner of your snip.
3. Press **Insert (0)** on the NumPad to perform a "Left Click Hold." This starts the selection box.
4. Use the direction keys to expand the selection. **Hold the Shift key** while tapping the direction keys to move the cursor exactly one pixel at a time.
5. Once the area is perfectly selected, press the **Decimal (.)** key on the NumPad to release the mouse button and capture the image.

#### Quick Reference for Mouse Keys
- **5**: Left-click.
- **0 (Ins)**: Press and hold left mouse button (Drag).
- **. (Del)**: Release left mouse button (Drop).
- **7, 9, 1, 3**: Move diagonally.
- **Shift**: Slow down movement for pixel-level accuracy.</noscript>
