                <!-- Content will be rendered here by marked -->
                <noscript>To retrieve only real user entries (human accounts) using `DirectorySearcher` while excluding computers and disabled accounts, you should use a precise LDAP filter. In Active Directory, computer accounts are technically subclasses of users, so a simple `(objectClass=user)` query often returns too much data.

### The Recommended LDAP Filter
The most efficient way to target real, active users is using the `sAMAccountType` attribute and a bitwise check on `userAccountControl`:

`(&(sAMAccountType=805306368)(!(userAccountControl:1.2.840.113556.1.4.803:=2)))`

### Explanation of the Filter Components:
1. **sAMAccountType=805306368**: This is the most efficient filter for users. Unlike `(objectClass=user)`, which includes computer accounts, this numeric constant specifically matches only user objects.
2. **userAccountControl:1.2.840.113556.1.4.803:=2**: This uses the `LDAP_MATCHING_RULE_BIT_AND` rule to check if the `ACCOUNTDISABLE` flag is set. The `!` prefix negates it, ensuring only enabled accounts are returned.
3. **objectCategory=person**: If you prefer the traditional approach, you can use `(&(objectCategory=person)(objectClass=user))`, but `sAMAccountType` is generally faster and more reliable for distinguishing humans from computers.

### C# Implementation Example:
```csharp
using (DirectoryEntry entry = new DirectoryEntry("LDAP://yourdomain.com"))
{
    using (DirectorySearcher searcher = new DirectorySearcher(entry))
    {
        // Filter for active users only
        searcher.Filter = "(&(sAMAccountType=805306368)(!(userAccountControl:1.2.840.113556.1.4.803:=2)))";
        searcher.PropertiesToLoad.Add("displayName");
        searcher.PropertiesToLoad.Add("mail");

        foreach (SearchResult result in searcher.FindAll())
        {
            string name = result.Properties["displayName"][0].ToString();
            // Process real user
        }
    }
}
```</noscript>
