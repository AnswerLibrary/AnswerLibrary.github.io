                <!-- Content will be rendered here by marked -->
                <noscript># Performing LDAP Substring Searches with the Star (*) Operator

In LDAP (Lightweight Directory Access Protocol), the asterisk (`*`) is the wildcard character used to perform substring searches within filter strings. It can be used to match any number of characters (including zero).

### 1. Basic Substring Filter Syntax
The general syntax for an LDAP filter is `(attribute=value)`. When performing a substring search, you place the `*` at the beginning, middle, or end of the value.

### 2. Types of Substring Searches

*   **Starts With (Initial Match):** Find entries where the attribute begins with a specific string.
    *   *Example:* `(givenName=Jo*)` matches "John", "Joan", or "Joshua".
*   **Ends With (Final Match):** Find entries where the attribute ends with a specific string.
    *   *Example:* `(sn=*son)` matches "Johnson", "Wilson", or "Thompson".
*   **Contains (Anywhere Match):** Find entries where the string exists anywhere within the attribute.
    *   *Example:* `(mail=*@gmail.com*)` matches any Gmail address.
*   **Multiple Wildcards:** You can use multiple stars to match complex patterns.
    *   *Example:* `(cn=S*t*n)` matches "Stephen", "Sutton", or "Stanton".

### 3. Special Considerations

*   **Performance:** Searches starting with a wildcard (e.g., `(cn=*smith)`) are typically slower because the LDAP server cannot use indexes effectively and may need to perform a full scan of the directory.
*   **Escaping Literals:** If you need to search for a literal asterisk character, you must use the hex escape sequence `\2a`.
    *   *Example:* To find a string that actually contains an asterisk, use `(description=*\2a*)`.
*   **Attribute Support:** Substring searches only work on attributes with a syntax that supports substring matching (like `DirectoryString` or `IA5String`). They will not work on integer or boolean attributes.</noscript>
