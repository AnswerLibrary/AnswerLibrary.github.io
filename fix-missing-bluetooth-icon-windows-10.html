                <!-- Content will be rendered here by marked -->
                <noscript># How to Fix a Missing Bluetooth Icon in the Windows 10 System Tray

If your Bluetooth icon has disappeared from the taskbar, it makes it difficult to manage connections. Follow these steps to restore the icon and ensure Bluetooth is functioning correctly.

### 1. Enable the Icon in Bluetooth Settings
The most common reason the icon is missing is that the 'Show icon' setting has been disabled.
1. Click **Start** > **Settings** (the gear icon).
2. Navigate to **Devices** > **Bluetooth & other devices**.
3. Scroll down to the 'Related settings' section and click **More Bluetooth options**.
4. In the **Options** tab, check the box next to **Show the Bluetooth icon in the notification area**.
5. Click **Apply** and then **OK**.

### 2. Check the Taskbar Overflow Menu
Sometimes the icon is active but hidden in the hidden icons menu.
1. Click the **upward arrow (^)** on the right side of your taskbar.
2. If you see the Bluetooth icon there, simply **click and drag** it back onto the main taskbar area.

### 3. Restart Bluetooth Support Service
If the service responsible for Bluetooth isn't running properly, the icon will disappear.
1. Press `Windows Key + R`, type `services.msc`, and press **Enter**.
2. Locate **Bluetooth Support Service** in the list.
3. Right-click it and select **Restart**.
4. Double-click the service to open its properties, change the **Startup type** to **Automatic**, and click **Apply**.

### 4. Run the Bluetooth Troubleshooter
Windows 10 has built-in tools to fix connectivity issues automatically.
1. Go to **Settings** > **Update & Security** > **Troubleshoot**.
2. Click on **Additional troubleshooters**.
3. Select **Bluetooth** and click **Run the troubleshooter**.

### 5. Reinstall Bluetooth Drivers
If the driver is corrupted, the icon may not appear.
1. Right-click the **Start** button and select **Device Manager**.
2. Expand the **Bluetooth** section.
3. Right-click your Bluetooth adapter (e.g., Intel Wireless Bluetooth) and select **Uninstall device**.
4. Restart your computer. Windows will automatically attempt to reinstall the driver upon reboot.</noscript>
