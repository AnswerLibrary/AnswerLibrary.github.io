                <!-- Content will be rendered here by marked -->
                <noscript># How to Detect if a DNS Server Supports CORS and DoH

To verify if a DNS server supports DNS over HTTPS (DoH) and Cross-Origin Resource Sharing (CORS), you can use command-line tools like `curl` or browser developer tools.

### 1. Detecting DoH Support

DNS over HTTPS typically uses the `application/dns-message` or `application/dns-json` content types. You can test a DoH endpoint by sending a probe via `curl`:

```bash
curl -H "accept: application/dns-message" -v "https://cloudflare-dns.com/dns-query?dns=AAABAAABAAAAAAAAA3d3dwdleGFtcGxlA2NvbQAAAQAB"
```

**What to look for:**
- **HTTP Status 200 OK**: Indicates the endpoint is active.
- **Content-Type**: Should be `application/dns-message` or `application/dns-json`.

### 2. Detecting CORS Support

CORS is required if you intend to perform DNS queries directly from a web browser (client-side JavaScript). You can check for CORS headers by adding an `Origin` header to your request:

```bash
curl -I -H "Origin: https://your-site.com" "https://cloudflare-dns.com/dns-query?name=example.com&type=A"
```

**What to look for:**
- **access-control-allow-origin**: This header must be present in the response. If the value is `*` or matches your origin, the server supports CORS.

### 3. Testing via Browser Console

The most definitive test for CORS is to run a `fetch` command directly in your browser's console (F12):

```javascript
fetch('https://dns.google/resolve?name=google.com', {
  method: 'GET',
  mode: 'cors'
})
.then(response => console.log('CORS and DoH are supported:', response.ok))
.catch(err => console.error('CORS blocked or DoH unavailable:', err));
```

If the request fails with a 'CORS policy' error, the DNS server does not allow cross-origin requests from web applications, even if it supports DoH.</noscript>
