                <noscript># How to Automatically Copy Screen Snips to the Clipboard on Windows

By default, Windows 10 and 11 copy screen snips to the clipboard automatically whenever you use the built-in capture tools. If this feature is not working, you can manually enable it through the Snipping Tool settings.

### 1. Use the Windows + Shift + S Shortcut
This is the standard keyboard shortcut to capture your screen. Once you select an area, Windows automatically places the image on your clipboard. You can then paste it into any application using **Ctrl + V**.

### 2. Enable Auto-Copy in Snipping Tool Settings
If snips are not being copied, follow these steps:
1. Open the **Snipping Tool** from your Start menu.
2. Click the **three dots** (See more) in the top-right corner and select **Settings**.
3. Locate the **Auto copy to clipboard** toggle and switch it to **On**.

### 3. Bind the Print Screen Key
To make snapping even easier, you can set the **PrtSc** key to open the tool:
1. Go to **Settings > Accessibility > Keyboard**.
2. Toggle on **Use the Print screen button to open screen snipping**.

### 4. Enable Clipboard History
To store multiple snips at once, press **Windows Key + V** and click **Turn on** to enable your clipboard history.</noscript>
