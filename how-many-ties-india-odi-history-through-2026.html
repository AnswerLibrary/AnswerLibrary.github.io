                <noscript>### India's ODI Tie History Through 2026

As of the end of 2024 and looking ahead to the 2026 season, the Indian men's national cricket team has been involved in a total of **10 tied One Day International (ODI) matches**. While ODIs are designed to produce a winner, these rare occurrences happen when both teams finish their innings with the exact same score.

### Chronological List of Tied ODIs

1. **vs West Indies (Perth, 1991)**: India was bowled out for 126, and the West Indies matched the score exactly.
2. **vs Zimbabwe (Indore, 1993)**: Both teams finished on 248 runs during the Hero Cup.
3. **vs Zimbabwe (Paarl, 1997)**: A thrilling finish in South Africa where both teams scored 236.
4. **vs England (Bengaluru, 2011)**: A high-scoring classic during the ICC Cricket World Cup where both teams reached 338.
5. **vs England (London, 2011)**: A match affected by the DLS method where the scores were par at the stoppage.
6. **vs Sri Lanka (Adelaide, 2012)**: Part of the Commonwealth Bank Series; both teams scored 236/9.
7. **vs New Zealand (Auckland, 2014)**: India chased New Zealand's 314, ending with 314/9.
8. **vs Afghanistan (Dubai, 2018)**: An Asia Cup encounter where both sides finished on 252.
9. **vs West Indies (Visakhapatnam, 2018)**: India scored 321/6 and the West Indies matched it with 321/7.
10. **vs Sri Lanka (Colombo, 2024)**: The most recent tie where India collapsed to 230 all out while chasing Sri Lanka's 230/8.

### Statistical Breakdown

* **Opponents**: India has tied twice with West Indies, Zimbabwe, England, and Sri Lanka, and once with New Zealand and Afghanistan.
* **World Cup Impact**: The 2011 tie against England remains one of the most famous matches in World Cup history.
* **Modern Era**: Since 2010, the frequency of ties involving India has increased slightly due to the competitive nature of modern white-ball cricket.</noscript>
