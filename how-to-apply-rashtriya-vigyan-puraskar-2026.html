                <noscript># How to Apply for Rashtriya Vigyan Puraskar 2026

The Rashtriya Vigyan Puraskar (RVP) is India's premier national award for excellence in science, technology, and innovation. For the 2026 cycle, candidates can follow the steps outlined below to ensure a successful application or nomination.

### 1. Identify the Award Category
Applicants can apply for one of the following four categories:
- **Vigyan Ratna:** Recognizing lifetime achievements and contributions.
- **Vigyan Shri:** Recognizing distinguished contributions in specific fields.
- **Vigyan Yuva-Shanti Swarup Bhatnagar:** Recognizing young scientists (up to 45 years) for exceptional work.
- **Vigyan Team:** For collaborative efforts by three or more scientists/innovators.

### 2. Check Eligibility
- **Nationality:** Open to Indian citizens, Persons of Indian Origin (PIOs), and Overseas Citizens of India (OCIs).
- **Domains:** Work must fall under one of the 13 designated domains, including Physics, Chemistry, Medicine, Engineering, and Space Science.

### 3. Nomination Process
Applications are processed through the official government portal:
1. **Visit the Portal:** Go to the [Rashtriya Puraskar Portal](https://awards.gov.in).
2. **Registration:** Create a user profile using a valid email and mobile number.
3. **Form Completion:** Select 'Rashtriya Vigyan Puraskar' and fill out the detailed form, including educational qualifications and professional milestones.
4. **Supporting Documents:** Upload a concise citation (max 250 words), a summary of scientific work, and links to significant publications or patents.
5. **Submission:** Both self-nominations and institutional nominations are accepted.

### 4. Important Dates (Tentative)
- **Nominations Open:** January 14, 2026
- **Last Date for Submission:** February 28, 2026
- **Announcement of Awards:** May 11, 2026 (National Technology Day)
- **Award Ceremony:** August 23, 2026 (National Space Day)

### Selection Process
The Rashtriya Vigyan Puraskar Committee (RVPC), led by the Principal Scientific Adviser to the Government of India, evaluates the entries based on scientific impact and societal benefit.</noscript>
