                <noscript># How to Remove Stale DNS Settings from Virtual Ethernet Adapters

Stale DNS settings in virtual adapters (often left behind by Hyper-V, VMware, or VirtualBox) can lead to connectivity issues and name resolution conflicts. Use the following methods to clean your configuration.

### 1. Flush DNS and Reset TCP/IP
The most common fix involves clearing the DNS cache and resetting the network stack. Open **Command Prompt as Administrator** and run:

- `ipconfig /flushdns` - Clears the current DNS resolver cache.
- `ipconfig /registerdns` - Refreshes all DHCP leases and re-registers DNS names.
- `netsh int ip reset` - Resets the TCP/IP stack to its original state, which often removes stuck virtual configurations.

### 2. Use PowerShell to Clear the Cache
In modern Windows environments, PowerShell provides a more direct command:

`Clear-DnsClientCache`

### 3. Remove Hidden or Ghost Adapters
Virtual adapters can remain hidden even after the software is uninstalled. To remove them:
1. Open **Device Manager**.
2. Click **View** > **Show hidden devices**.
3. Expand **Network adapters**.
4. Right-click and **Uninstall** any grayed-out or 'Ghost' virtual adapters that are no longer in use.

### 4. Cleanup via the Registry (Advanced)
If settings persist, they may be stuck in the Registry. 
1. Navigate to: `HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters\Interfaces`.
2. Look through the GUID sub-keys for entries containing the stale IP or DNS addresses.
3. Delete the corresponding key (Ensure you backup the registry before making changes).</noscript>
