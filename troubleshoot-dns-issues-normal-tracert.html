      "text": "How to Troubleshoot DNS Issues When Tracert Works\\n\\nWhen tracert (or traceroute) shows a successful path to an IP address but you cannot resolve or access a website via its domain name, the problem is isolated to the Application Layer, specifically the Domain Name System (DNS). Since the routing path is confirmed to be functional, follow these steps to identify and fix the resolution error:\\n\\n1. Perform an nslookup Test: The first step is to verify if your system can resolve the hostname. Open your terminal and type nslookup example.com. If it returns 'Non-existent domain' or 'Request timed out' while tracert to a known IP works, the DNS resolver is the culprit.\\n\\n2. Flush the DNS Cache: Stale or corrupted local records often cause resolution failures. Clear your local cache using the following commands:\\n   - Windows: ipconfig /flushdns\\n   - macOS: sudo dscacheutil -flushcache; sudo killall -HUP mDNSResponder\\n\\n3. Inspect the Hosts File: The local hosts file takes precedence over DNS servers. Check C:\\Windows\\System32\\drivers\\etc\\hosts (Windows) or /etc/hosts (Linux/macOS) for any manual entries that might be redirecting the domain to an incorrect or null IP address.\\n\\n4. Change DNS Providers: Your ISP's DNS servers might be down or lagging. Manually set your network adapter to use public DNS resolvers to see if the issue persists:\\n   - Google Public DNS: 8.8.8.8 and 8.8.4.4\\n   - Cloudflare DNS: 1.1.1.1 and 1.0.0.1\\n\\n5. Check Port 53 Connectivity: DNS operates on Port 53 (UDP and TCP). Ensure that your local firewall, antivirus, or corporate edge firewall is not blocking outbound traffic on this specific port.\\n\\n6. Disable DNS over HTTPS (DoH): Modern browsers (Chrome, Firefox, Edge) often have their own DNS settings independent of the OS. If nslookup works in the terminal but the browser fails, go to browser settings and temporarily disable 'Secure DNS' or 'DNS over HTTPS' to test connectivity."

                <!-- Content will be rendered here by marked -->
                <noscript>### How to Troubleshoot DNS Issues When Tracert Works\n\nWhen `tracert` (or `traceroute`) shows a successful path to an IP address but you cannot resolve or access a website via its domain name, the problem is isolated to the **Application Layer**, specifically the **Domain Name System (DNS)**. Since the routing path is confirmed to be functional, follow these steps to identify and fix the resolution error:\n\n1. **Perform an nslookup Test**: The first step is to verify if your system can resolve the hostname. Open your terminal and type `nslookup example.com`. If it returns 'Non-existent domain' or 'Request timed out' while `tracert` to a known IP works, the DNS resolver is the culprit.\n\n2. **Flush the DNS Cache**: Stale or corrupted local records often cause resolution failures. Clear your local cache using the following commands:\n   - **Windows**: `ipconfig /flushdns`\n   - **macOS**: `sudo dscacheutil -flushcache; sudo killall -HUP mDNSResponder`\n\n3. **Inspect the Hosts File**: The local `hosts` file takes precedence over DNS servers. Check `C:\Windows\System32\drivers\etc\hosts` (Windows) or `/etc/hosts` (Linux/macOS) for any manual entries that might be redirecting the domain to an incorrect or null IP address.\n\n4. **Change DNS Providers**: Your ISP's DNS servers might be down or lagging. Manually set your network adapter to use public DNS resolvers to see if the issue persists:\n   - **Google Public DNS**: 8.8.8.8 and 8.8.4.4\n   - **Cloudflare DNS**: 1.1.1.1 and 1.0.0.1\n\n5. **Check Port 53 Connectivity**: DNS operates on **Port 53** (UDP and TCP). Ensure that your local firewall, antivirus, or corporate edge firewall is not blocking outbound traffic on this specific port.\n\n6. **Disable DNS over HTTPS (DoH)**: Modern browsers (Chrome, Firefox, Edge) often have their own DNS settings independent of the OS. If `nslookup` works in the terminal but the browser fails, go to browser settings and temporarily disable 'Secure DNS' or 'DNS over HTTPS' to test connectivity.</noscript>
