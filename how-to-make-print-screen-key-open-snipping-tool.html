                <noscript># How to Make the Print Screen Key Open Snipping Tool Automatically

In Windows 10 and 11, you can rebind the **Print Screen (PrtSc)** key to launch the **Snipping Tool** (or Snip & Sketch) instead of just copying the full screen to your clipboard. This allows for more precise screen captures and faster editing.

### Steps for Windows 11
1. **Open Settings**: Press `Windows Key + I` on your keyboard.
2. **Navigate to Accessibility**: Click on **Accessibility** in the left-hand sidebar.
3. **Select Keyboard**: Scroll down under the 'Interaction' section and click on **Keyboard**.
4. **Toggle the Setting**: Look for the option labeled **'Use the Print screen button to open screen snipping'** and switch the toggle to **On**.

### Steps for Windows 10
1. **Open Settings**: Press `Windows Key + I`.
2. **Navigate to Ease of Access**: Click on **Ease of Access**.
3. **Select Keyboard**: In the left sidebar, click on **Keyboard**.
4. **Print Screen Shortcut**: Scroll down to the 'Print Screen shortcut' section and toggle **On** the setting that says **'Use the PrtScn button to open screen snipping'**.

### Note
You may need to restart your computer for the changes to take effect if the shortcut does not work immediately. Once enabled, pressing the **PrtSc** key will instantly trigger the screen capture overlay at the top of your screen.</noscript>
