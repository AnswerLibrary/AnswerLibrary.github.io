                <!-- Content will be rendered here by marked -->
                <noscript># How to Enable Rectangular Snip by Default in Windows 10

Windows 10 uses the **Snip & Sketch** tool (now integrated into the Snipping Tool) for screen captures. While the tool usually defaults to the Rectangular Snip, you can ensure it is your primary method by using specific shortcuts and mapping.

### 1. Use the Primary Keyboard Shortcut
The fastest way to trigger a rectangular snip is by pressing:
**`Windows Key + Shift + S`**
By default, the toolbar that appears at the top of the screen will have the **Rectangular Snip** icon (the first selection) pre-activated. You can immediately click and drag to capture your area.

### 2. Map Snip & Sketch to the Print Screen Key
To make rectangular snipping your default action when pressing the `PrtSc` key, follow these steps:
1. Open the **Settings** menu (Windows Key + I).
2. Select **Ease of Access**.
3. Scroll down the left sidebar and click on **Keyboard**.
4. Locate the **Print Screen shortcut** section.
5. Toggle the switch to **On** for the option "Use the PrtScn button to open screen snipping."
6. You may need to restart your computer for changes to take effect.

Once enabled, hitting the Print Screen key will automatically launch the rectangular snip overlay.

### 3. Setting Default Mode in Snipping Tool
If you prefer using the classic Snipping Tool application:
1. Open the **Snipping Tool** from the Start menu.
2. Click the **Mode** button.
3. Select **Rectangular Snip**.
4. The application will remember this selection as the default mode the next time you open the app directly.</noscript>
