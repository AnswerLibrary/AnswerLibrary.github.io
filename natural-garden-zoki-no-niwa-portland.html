                <!-- Content will be rendered here by marked -->
                <noscript># The 'Natural Garden' (Zoki no Niwa) in Portland

The **'Natural Garden'** (known in Japanese as *zoki no niwa*) is a relatively modern style of Japanese landscaping that gained significant prominence in Portland through the 2017 expansion of the **Portland Japanese Garden**. Unlike the highly manicured and symbolic traditional styles like the Zen rock garden, this style focuses on the organic beauty of everyday nature.

### What is *Zoki no Niwa*?
Literally translating to a "garden of miscellaneous trees," *zoki no niwa* emphasizes the beauty of common deciduous trees rather than just the sculpted pines or iconic maples. Key characteristics include:
- **Naturalism:** It mimics the look of a natural woodland or the edge of a forest.
- **Seasonality:** It celebrates the full cycle of the seasons—from the delicate budding of spring to the stark, architectural beauty of bare branches in winter.
- **Atmosphere:** The design creates a "breathable," tranquil space that feels wild yet remains deeply intentional.

### The Portland Connection
In Portland, this style was masterfully implemented in the Garden's **Cultural Village**, designed by world-renowned architect **Kengo Kuma** and the Garden's Curator Emeritus, **Sadafumi Uchiyama**. 
- **Ecological Integration:** The design bridges the gap between the urban entrance and the historic formal gardens. It intentionally incorporates Pacific Northwest plant species that thrive in the local climate.
- **Forest Bathing:** It provides an ideal setting for *shinrin-yoku* (forest bathing), allowing visitors to experience the restorative power of a woodland environment within an urban context.

### Key Features
1. **Layered Canopy:** Using trees of varying heights and leaf densities to create visual depth and dappled sunlight.
2. **Understory Planting:** A rich tapestry of ferns, mosses, and shrubs that replicates the complexity of a forest floor.
3. **Fluidity:** Moving away from rigid symmetry toward a more fluid, organic layout that feels as though it evolved naturally over time.</noscript>
