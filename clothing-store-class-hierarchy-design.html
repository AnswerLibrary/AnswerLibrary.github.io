                <!-- Content will be rendered here by marked -->
                <noscript>### Designing a Multi-Level Class Hierarchy for a Clothing Store

Designing a robust class hierarchy for a clothing store application requires a structured approach using Object-Oriented Programming (OOP) principles. A multi-level structure ensures that code is reusable, maintainable, and scalable.

#### Level 1: The Base Class (Product)
At the top of the hierarchy is the `Product` class. This abstract base class contains attributes and methods universal to every item in the inventory.
- **Attributes:** `product_id`, `name`, `description`, `price`, `stock_quantity`, `category_type`.
- **Methods:** `get_details()`, `update_stock()`, `calculate_discount()`.

#### Level 2: Core Categories (Apparel vs. Accessories)
The second level separates broad product types that require different metadata.
- **Apparel:** Adds attributes like `material_composition`, `brand`, and `gender_target` (e.g., Men, Women, Unisex).
- **Accessories:** Adds attributes like `accessory_type` (e.g., Watch, Belt, Bag).

#### Level 3: Specialized Sub-Categories (Tops, Bottoms, Footwear)
Under the `Apparel` class, we specialize further based on how the item is worn, which determines the sizing logic.
- **Tops:** Adds `neck_size`, `sleeve_length`, and `neckline_style`.
- **Bottoms:** Adds `waist_size`, `inseam_length`, and `fit_type` (e.g., Slim, Relaxed).
- **Footwear:** Adds `shoe_size_system` (EU/US/UK) and `width_fitting`.

#### Level 4: Specific Product Implementations (Leaf Classes)
These are the classes you instantiate for specific products.
- **TShirt (Tops):** Adds `is_graphic_tee` and `print_technology`.
- **Jeans (Bottoms):** Adds `denim_wash_type` and `distress_level`.

### Key OOP Principles Applied
1. **Inheritance:** The `Jeans` class automatically inherits `price` from `Product` and `material` from `Apparel`.
2. **Encapsulation:** Pricing logic and stock validation are kept internal to the `Product` class to prevent data corruption.
3. **Polymorphism:** A single function can process a list of `Product` objects, calling `get_details()` on each, regardless of whether it is a `TShirt` or a `Shoe`.</noscript>
