                <noscript>### Setting a Default Constant in a Java Subclass Constructor

In Java, the standard way to set a default constant value (such as a specific color) for a subclass is by using the `super()` keyword within the subclass constructor. This allows you to pass a hardcoded value or a constant to the parent class constructor whenever the subclass is instantiated.

#### Code Example

```java
// Parent Class
class Garment {
    protected String color;

    public Garment(String color) {
        this.color = color;
    }
}

// Subclass
class Jeans extends Garment {
    // Defining a constant for the default color
    private static final String DEFAULT_COLOR = "Blue";

    public Jeans() {
        // Passing the constant to the parent constructor via super()
        super(DEFAULT_COLOR);
    }

    public void displayColor() {
        System.out.println("The jeans color is: " + color);
    }
}
```

#### Why This Works:
1. **The super() Keyword**: The `super()` call invokes the constructor of the parent class. By passing a value directly into `super()`, you ensure that the parent's fields are initialized with your default value.
2. **Requirement**: The `super()` call must be the very first statement in the subclass constructor.
3. **Static Constants**: Using a `private static final` variable to hold the default value makes the code cleaner and easier to maintain if the default needs to change later.</noscript>
