                <!-- Content will be rendered here by marked -->
                <noscript># How to Fix MSI GT72VR Bluetooth Disappearance

If your Bluetooth has stopped working or disappeared from the Device Manager on your MSI GT72VR after a Windows update, follow these proven solutions to restore functionality:

### 1. Perform an EC Reset (Recommended)
This is the most effective fix for MSI laptops. It resets the Embedded Controller which manages hardware power states.
1. Turn off the laptop and unplug the AC power adapter.
2. Locate the small **Battery Reset Hole** (a tiny pinhole) on the side or bottom of the chassis.
3. Use a paperclip to press and hold the button inside for 30 seconds.
4. Plug the AC adapter back in—the laptop will not turn on without the adapter after an EC reset—and power it on.

### 2. Cold Boot Power Cycle
1. Shut down Windows completely.
2. Unplug the power cable and all USB peripherals.
3. Hold the power button down for a full **60 seconds** to drain remaining electricity.
4. Reconnect the power and restart.

### 3. Reinstall Bluetooth Drivers
1. Right-click the Start button and select **Device Manager**.
2. Check for 'Bluetooth' or look under 'Universal Serial Bus controllers' for an 'Unknown USB Device (Device Descriptor Request Failed)'.
3. Right-click the faulty device and select **Uninstall device**.
4. Download the latest Bluetooth drivers from the MSI support website for the GT72VR and install them manually.

### 4. Check BIOS/UEFI Settings
Restart your laptop and tap the **Delete** key to enter BIOS. Ensure that the onboard Bluetooth and Wireless modules are set to 'Enabled' under the Advanced tab.</noscript>
