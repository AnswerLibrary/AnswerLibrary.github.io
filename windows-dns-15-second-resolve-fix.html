                <!-- Content will be rendered here by marked -->
                <noscript># Troubleshooting 15-Second DNS Delays on Windows

A 15-second delay in DNS resolution on Windows workstations is typically not a single failure but a symptom of the operating system's sequential timeout and fallback logic. When the primary DNS resolution fails, Windows cycles through multiple protocols and interfaces, each adding to the total wait time.

### Common Causes

1. **LLMNR and NetBIOS Fallback**: If a standard DNS query to your configured server fails or times out, Windows attempts to resolve the name using Link-Local Multicast Name Resolution (LLMNR) and NetBIOS Name Service (NBT-NS). These secondary protocols have their own timeout windows—often 5 seconds each—which, when combined with the initial DNS timeout, aggregate to approximately 15 seconds.

2. **IPv6 Precedence**: By default, Windows prefers IPv6 (AAAA records) over IPv4 (A records). If your network environment has IPv6 enabled on the workstations but the local DNS server or router does not support it or drops the packets without a 'Destination Unreachable' response, the system will hang while waiting for the IPv6 query to time out before falling back to IPv4.

3. **Multi-Homed Routing (Multiple Adapters)**: If a workstation has multiple active network interfaces (e.g., Ethernet, Wi-Fi, and a VPN), Windows may send DNS queries across all of them. If one interface is connected to a dead or restricted network, the DNS client service may wait for that specific interface's timeout before returning a result to the application.

4. **Recursive Query Retries**: The Windows DNS client uses a specific retry interval (1, 1, 2, 4, and 8 seconds). If the first few attempts fail due to high latency or packet loss, the cumulative delay quickly reaches the 15-second threshold.

### How to Fix the Delay

- **Disable LLMNR**: Open the Group Policy Editor and navigate to **Computer Configuration > Administrative Templates > Network > DNS Client**. Enable the policy 'Turn off multicast name resolution'.
- **Check Adapter Priority**: Ensure your primary network adapter has the lowest interface metric in the Advanced TCP/IP settings to ensure it is queried first.
- **Disable IPv6 (If Unused)**: If your network is strictly IPv4, unchecking 'Internet Protocol Version 6' in the Network Adapter properties can eliminate AAAA timeout delays.
- **Flush the DNS Cache**: Use the command `ipconfig /flushdns` in an elevated Command Prompt to clear any negative cache entries.</noscript>
