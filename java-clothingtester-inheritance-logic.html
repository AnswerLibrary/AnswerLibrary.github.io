                <noscript># Designing a Java ClothingTester Class to Verify Inheritance Logic

To effectively verify inheritance logic in Java, you must create a structured hierarchy where a base class (superclass) defines common attributes, and specific subclasses inherit and extend those properties. The `ClothingTester` class then acts as the entry point to instantiate these objects and validate their behavior.

### 1. Define the Superclass: Clothing
The base class contains fields common to all apparel, such as `size` and `price`.

```java
public class Clothing {
    private String size;
    private double price;

    public Clothing(String size, double price) {
        this.size = size;
        this.price = price;
    }

    public void displayDetails() {
        System.out.println("Size: " + size + ", Price: $" + price);
    }
}
```

### 2. Create a Subclass: Shirt
The `Shirt` class uses the `extends` keyword to inherit from `Clothing` and adds its own specific attribute, `buttonType`.

```java
public class Shirt extends Clothing {
    private String buttonType;

    public Shirt(String size, double price, String buttonType) {
        super(size, price); // Calls the superclass constructor
        this.buttonType = buttonType;
    }

    @Override
    public void displayDetails() {
        super.displayDetails();
        System.out.println("Button Style: " + buttonType);
    }
}
```

### 3. The ClothingTester Class
This class contains the `main` method to verify that the inheritance and method overriding work as expected.

```java
public class ClothingTester {
    public static void main(String[] args) {
        // Testing polymorphism and inheritance
        Clothing genericItem = new Clothing("Medium", 19.99);
        Shirt formalShirt = new Shirt("Large", 45.00, "Pearl");

        System.out.println("--- Base Class Test ---");
        genericItem.displayDetails();

        System.out.println("\n--- Subclass Test ---");
        formalShirt.displayDetails();
    }
}
```

### Key Concepts Verified:
- **The `extends` Keyword**: Establishes the 'is-a' relationship.
- **The `super()` Call**: Ensures the parent constructor initializes shared fields.
- **Method Overriding**: Allows the subclass to provide a specific implementation of `displayDetails()` while still utilizing the parent's logic.</noscript>
