                <!-- Content will be rendered here by marked -->
                <noscript>### How to Select a Snip Area Using Keyboard Shortcuts Without a Mouse

Windows provides a highly accessible way to capture screenshots using only your keyboard. If you cannot use a mouse, follow these precise steps to select a snip area using the Windows Snipping Tool (also known as Snip & Sketch):

1. **Open the Snipping Menu**: Press **Windows Key + Shift + S** simultaneously. This will dim the screen and open the snipping overlay at the top.
2. **Navigate the Modes**: By default, the Rectangular Snip is usually selected. You can press the **Tab** key to cycle through the different modes: Rectangular, Freeform, Window, or Full-screen. Press **Enter** to confirm your choice.
3. **Position the Crosshair**: Once a mode is active, use your **Arrow keys** to move the cursor (the crosshair) to the starting point of the area you want to capture.
4. **Start the Selection**: Press the **Enter** key or the **Spacebar** to set the anchor point (the first corner of your selection).
5. **Expand the Selection Area**: Use the **Arrow keys** to drag the selection box across the screen. To move the cursor in larger increments for faster selection, hold down the **Shift** key while pressing the **Arrow keys**.
6. **Complete the Capture**: Once you have highlighted the desired area, press the **Enter** key. The screenshot will be captured and automatically saved to your clipboard.

### Quick Recap of Keys:
- **Windows + Shift + S**: Launch tool.
- **Tab**: Switch between snipping modes.
- **Arrow Keys**: Move the cursor.
- **Enter/Space**: Start or finish selection.
- **Shift + Arrows**: Move cursor faster.</noscript>
