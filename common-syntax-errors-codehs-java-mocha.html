                <noscript># Common Syntax Errors in CodeHS AP CSA (Java Mocha)

When working through the CodeHS AP Computer Science A curriculum using the Java Mocha console, students often encounter specific syntax hurdles. Understanding these common mistakes can help you debug your code faster.

### 1. Missing Semicolons (`;`)
In Java, every statement must end with a semicolon. Forgetting one is the most frequent cause of a "compiler error."
*   **Error:** `int x = 10` 
*   **Fix:** `int x = 10;` 

### 2. Case Sensitivity Issues
Java is strictly case-sensitive. Keywords and class names must be capitalized correctly.
*   **Common Mistake:** Writing `system.out.println` instead of `System.out.println`.
*   **Common Mistake:** Writing `string` instead of `String`.

### 3. Mismatched Braces and Parentheses
Every opening brace `{` or parenthesis `(` must have a corresponding closing `}` or `)`. 
*   **Tip:** If you see an error like "reached end of file while parsing," it almost always means you are missing a closing brace `}` at the end of your class or method.

### 4. Incorrect Main Method Signature
The Java interpreter looks for a very specific line to start your program. If it is slightly off, the program won't run.
*   **Correct:** `public static void main(String[] args)`
*   **Common Errors:** Forgetting `static`, forgetting `String[]`, or lowercase `string`.

### 5. Variable Declaration and Initialization
You must declare the type of a variable before using it, and you cannot use a variable until it has been initialized with a value.
*   **Error:** `count = 5;` (without `int count;` first).
*   **Error:** `int x; System.out.println(x);` (using a variable before assigning a value).

### 6. String vs. Char Quotes
In Java, double quotes are for Strings, and single quotes are for single characters.
*   **Correct:** `String name = "Karel";` 
*   **Correct:** `char letter = 'K';` 

### 7. The "Smart Quote" Bug
If you copy and paste code from a word processor (like Google Docs), you might accidentally use "curly" quotes. Java only recognizes straight quotes: `"`.</noscript>
