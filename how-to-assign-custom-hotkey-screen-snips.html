                <noscript># How to Assign a Custom Hotkey (Ctrl+Alt+S) for Screen Snips

While Windows 10 and 11 use **Win + Shift + S** for the Snipping Tool by default, many users prefer a custom combination like **Ctrl + Alt + S**. Since Windows doesn't allow you to change system hotkeys directly in Settings, you can use one of the following three methods.

### Method 1: Create a Desktop Shortcut (Built-in)
This is the easiest method that doesn't require installing third-party software:
1. **Right-click** an empty space on your desktop and select **New > Shortcut**.
2. In the location field, type: `explorer.exe ms-screenclip:` and click **Next**.
3. Name the shortcut **ScreenSnip** and click **Finish**.
4. **Right-click** the new shortcut on your desktop and select **Properties**.
5. Click inside the **Shortcut key** box.
6. Press **Ctrl + Alt + S** on your keyboard. The field should automatically update.
7. Click **Apply** and **OK**.

*Note: The shortcut must remain on your desktop for the hotkey to function.*

### Method 2: Use AutoHotkey (Highly Reliable)
AutoHotkey is a powerful scripting tool that can remap keys seamlessly:
1. Download and install [AutoHotkey](https://www.autohotkey.com/).
2. Right-click your desktop and select **New > AutoHotkey Script**.
3. Right-click the file and select **Edit Script**.
4. Paste the following line: `^!s::#+s` (This maps Ctrl+Alt+S to Win+Shift+S).
5. Save the file and double-click it to run the script.

### Method 3: Use Third-Party Tools
If you want more flexibility, dedicated screen capture tools like **ShareX** or **Lightshot** are excellent alternatives. These applications have dedicated **Hotkey** menus in their settings where you can easily bind the screen snip function to **Ctrl + Alt + S** or any other preferred key combination.</noscript>
