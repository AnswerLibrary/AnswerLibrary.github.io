                <!-- Content will be rendered here by marked -->
                <noscript># Latest Updates in PM Viksit Bharat Rozgar Initiatives

Under the vision of **Viksit Bharat @ 2047**, the Government of India has introduced several landmark updates to employment schemes in the Union Budget 2024-25. These initiatives are designed to bridge the gap between job seekers and employers through the **Employment Linked Incentive (ELI)** framework.

### 1. The Three New ELI Schemes
*   **Scheme A (First-Timers):** This scheme provides a direct benefit transfer (DBT) of one month’s wage (up to ‑15,000) in three installments to individuals entering the formal workforce for the first time. It targets those registered with the EPFO.
*   **Scheme B (Manufacturing Job Creation):** To boost the manufacturing sector, incentives are provided directly to both the employee and the employer regarding their EPFO contributions for the first four years of employment.
*   **Scheme C (Support to Employers):** The government reimburses employers up to ‑3,000 per month for two years for each additional employee hired, incentivizing the creation of new formal jobs.

### 2. PM Internship Scheme
A massive internship program has been launched to provide 1 crore youth with exposure to real-life business environments in the top 500 companies over five years. Interns receive a monthly stipend of ‑5,000 and a one-time joining assistance of ‑6,000.

### 3. Skilling and Education Loan Revisions
*   **Model Skill Loan Scheme:** The limit has been increased to ‑7.5 lakh to help students access specialized vocational courses.
*   **Education Loans:** Financial support for loans up to ‑10 lakh is now available for youth who have not been eligible for other government schemes, focusing on domestic higher education institutions.

### 4. ITI Upgradation
1,000 Industrial Training Institutes (ITIs) will be upgraded in a hub-and-spoke model. The curriculum is being redesigned to align with industry-specific skills required for the modern economy. 

### 5. Increased Participation of Women
The government is setting up working women's hostels and creches in collaboration with the industry to increase female labor force participation, a key pillar of the Viksit Bharat mission.</noscript>
