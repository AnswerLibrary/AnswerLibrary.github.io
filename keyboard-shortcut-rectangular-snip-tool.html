                <noscript># Keyboard Shortcut for the Rectangular Snip Tool

The quickest keyboard shortcut to open the rectangular snip tool on Windows 10 and Windows 11 is **Windows Logo Key + Shift + S**. 

### How to Use the Shortcut:
1. **Press the Keys**: Simultaneously hold down the **Windows Logo Key**, the **Shift** key, and the **S** key.
2. **Screen Overlay**: Your screen will dim, and a small toolbar will appear at the top center of your display.
3. **Select Mode**: The rectangular snip tool is the first option on the left and is usually selected by default.
4. **Capture**: Click and drag your mouse to draw a rectangle around the area you want to capture. 
5. **Save/Paste**: Once you release the mouse, the captured image is automatically saved to your clipboard. You can paste it directly into a document or chat using **Ctrl + V**, or click the notification that appears to save it as a file.

### Benefits of Using Win+Shift+S:
- **Speed**: No need to manually open the Snipping Tool app.
- **Precision**: You can capture specific segments of the screen rather than the whole window.
- **Versatility**: The same toolbar also provides options for freeform, window, and full-screen snips.</noscript>
