                <!-- Content will be rendered here by marked -->
                <noscript>### Aligning AWS DocumentDB Training with MongoDB Migration

To successfully migrate MongoDB workloads to Amazon DocumentDB, your training strategy must move beyond basic CRUD operations and focus on the architectural and operational shifts inherent in the AWS ecosystem. Below is a structured approach to aligning your team's skills with the migration lifecycle.

#### 1. Focus on Architectural Differences
Training should start by highlighting that DocumentDB uses a decoupled storage and compute architecture. Unlike traditional MongoDB sharding, DocumentDB handles storage scaling automatically. Teams need to learn how to manage instance classes (compute) separately from the cluster volume (storage).

#### 2. Master Migration Tools
Alignment requires proficiency in two primary migration paths:
- **AWS Database Migration Service (DMS):** Learn to use DMS for live, online migrations that synchronize data from an active MongoDB source to DocumentDB with minimal downtime.
- **Offline Migration:** Train on using native MongoDB tools like `mongodump` and `mongorestore` for smaller workloads or scenarios where a maintenance window is acceptable.

#### 3. Compatibility and Performance Tuning
Because DocumentDB is compatible with the MongoDB API but has a different underlying engine, training must cover:
- **Compatibility Tooling:** Using the DocumentDB Compatibility Tool to identify unsupported operators or indexes.
- **Index Management:** Understanding how DocumentDB handles indexes differently than MongoDB, particularly regarding memory usage in the Index Buffer Cache.
- **Query Optimization:** Learning to use `explain()` plans specifically for the DocumentDB engine.

#### 4. Security and Networking Integration
In MongoDB, you often manage users within the database. In DocumentDB, security is a layer-cake of AWS services. Training should prioritize:
- **IAM Integration:** Mapping database access to AWS Identity and Access Management roles.
- **VPC Networking:** Ensuring the cluster is isolated within a Private Cloud and accessed via secure Security Groups.
- **Encryption:** Managing data-at-rest and data-in-transit via AWS KMS.

#### 5. Monitoring and Operations
Shift from MongoDB-centric monitoring to **Amazon CloudWatch**. Teams should be trained to monitor specific DocumentDB metrics like `CPUUtilization`, `DatabaseConnections`, and `BufferCacheHitRatio` to proactively scale clusters during and after the migration.</noscript>
