                <!-- Content will be rendered here by marked -->
                <noscript>### How to Verify a User in LDAP Using a Default Base Query

Verifying a user in an LDAP (Lightweight Directory Access Protocol) directory typically involves a two-step process: **Search** and **Bind**. This ensures that the user exists and that the provided credentials are correct.

#### 1. Search for the User Distinguished Name (DN)

To verify a user, you must first locate their unique DN within the directory. This is done by querying the LDAP server using a **Base DN** (the entry point) and a search filter.

**Example Search Command:**
```bash
ldapsearch -x -H ldap://your-ldap-server -b "dc=example,dc=com" "(uid=username)"
```
- **-b (Base DN):** This is your default base query starting point (e.g., `dc=example,dc=com`).
- **Filter:** A criteria like `(uid=username)` or `(sAMAccountName=username)` used to find the specific record.

#### 2. Authenticate via Bind Operation

Once you have retrieved the user's full DN (e.g., `uid=john,ou=users,dc=example,dc=com`), you verify the user by attempting a "Bind" operation. If the LDAP server accepts the bind request with the user's password, the user is verified.

**Example Bind Command:**
```bash
ldapwhoami -x -D "uid=username,ou=users,dc=example,dc=com" -W -H ldap://your-ldap-server
```
- **-D (Bind DN):** The full path to the user object found in step one.
- **-W:** Prompts for the user's password to test authentication.

#### Key Components of the Query
- **Base DN:** Defines where the search begins in the directory tree.
- **Scope:** Usually set to `sub` (subtree) to ensure the query looks through all nested organizational units.
- **Filter:** The attribute-value pair used to identify the user (e.g., `mail=user@example.com`).</noscript>
