                <!-- Content will be rendered here by marked -->
                <noscript>### How to Run a DNS Benchmark on Windows

Finding the fastest DNS server can significantly improve your web browsing speed by reducing the time it takes to resolve domain names. Follow these steps to perform a benchmark on Windows:

#### 1. Download GRC's DNS Benchmark
While there are several tools, **Steve Gibson's DNS Benchmark** is widely considered the gold standard for Windows users due to its depth and portability.
- Visit the [GRC website](https://www.grc.com/dns/benchmark.htm).
- Download `DNSBench.exe` (no installation required).

#### 2. Run the Initial Test
- Open the application and navigate to the **Nameservers** tab.
- Click the **Run Benchmark** button. 
- The tool will test a default list of popular DNS servers (like Google, Cloudflare, and OpenDNS) against your current provider.

#### 3. Build a Custom List (Highly Recommended)
To find the absolute fastest server for your specific geographic location, you should build a custom list:
- Click the **Add/Remove** button.
- Select **Build Custom Nameserver List**.
- This process takes about 30-40 minutes as it tests thousands of global servers to find the 50 closest to you, but you only need to do it once.

#### 4. Interpret the Results
Once the test completes, the results are sorted by response speed:
- **Red bar**: Represents 'Uncached' lookups (the most important metric for general browsing).
- **Green bar**: Represents 'Cached' lookups.
- **Blue bar**: Represents 'Dotcom' lookups.
- The fastest servers will be listed at the top. Look for servers with the shortest bars and no red 'failure' flags.

#### 5. Update Your Windows DNS Settings
Once you have the top two IP addresses from the benchmark:
1. Open **Settings** > **Network & Internet**.
2. Click on **Change adapter options**.
3. Right-click your active connection (Wi-Fi or Ethernet) and select **Properties**.
4. Select **Internet Protocol Version 4 (TCP/IPv4)** and click **Properties**.
5. Select **Use the following DNS server addresses** and enter the IPs from your benchmark results.
6. Click **OK** to save.</noscript>
