                <noscript># Kashintei: The Authentic Japanese Tea House

The authentic Japanese tea house located on the grounds of the **Portland Japanese Garden** is named **Kashintei**. The name translates to "Flower Heart Tea House."

### A Masterpiece of Tradition
Kashintei is a stunning example of **Sukiya-style architecture**, known for its use of natural materials and simple, elegant lines. To maintain its cultural integrity, the tea house was originally constructed in Japan in the 1960s, then disassembled and shipped to Portland, Oregon, where it was meticulously rebuilt in 1968. This ensures that the structure remains a true piece of Japanese heritage.

### Cultural Importance
Kashintei is not merely a decorative building; it is a functioning site for the **Way of Tea (Chado)**. The garden surrounding the tea house, known as the *roji* (dewy path), is designed to help visitors transition from the hectic outside world to a state of spiritual calm. Key features of the tea house area include:

- **Machiai:** A sheltered waiting area for guests.
- **Tsukubai:** A ritual stone washbasin for purification.
- **Ishidoro:** Traditional stone lanterns that guide the path.

While visitors cannot usually enter the interior of the tea house without a specific ceremony invitation, the exterior and the surrounding tea garden offer a deeply immersive cultural experience that is unique in North America.</noscript>
