                <!-- Content will be rendered here by marked -->
                <noscript>When DNS lookups work for cached sites but fail for new ones, it typically indicates that your system or DNS resolver is able to retrieve stored records but is failing to perform a **recursive lookup** for unknown addresses. Here are the most common reasons for this behavior:

### 1. Upstream Recursive Resolver Failure
DNS resolvers (usually provided by your ISP) store popular records in their cache. If the resolver loses its ability to communicate with the internet's root nameservers or Top-Level Domain (TLD) servers, it can still serve requests for websites it already knows (cached). However, it will fail to 'ask' for the IP address of any new or uncached domain.

### 2. Local Cache vs. Live Network
Your operating system and browser maintain a local DNS cache. If your internet connection is active but your DNS settings are misconfigured, your browser will seamlessly load sites you have recently visited because it already knows their IP addresses. New sites require a fresh query to a DNS server, which fails if the server is unreachable or the connection on Port 53 (DNS) is blocked.

### 3. Firewall and Security Rules
Network security software or hardware firewalls may sometimes allow traffic to established IP ranges while blocking new DNS queries. This is common in enterprise environments where a 'DNS sinkhole' or an aggressive firewall policy might prevent outbound lookups to unauthorized DNS servers.

### 4. Stale DNS Configuration
If you have manually configured a DNS server address that has gone offline, your computer might be operating solely on 'stale' data from its internal cache. Once that cache expires (based on the Time to Live or TTL value), those sites will also stop working.

### How to Fix the Issue:
- **Change DNS Servers:** Switch your network settings to use a reliable public DNS like Google (8.8.8.8) or Cloudflare (1.1.1.1).
- **Flush DNS Cache:** Clear your local records. On Windows, use `ipconfig /flushdns` in the command prompt. On macOS, use `sudo killall -HUP mDNSResponder`.
- **Check Router Settings:** Ensure your router is correctly receiving DNS assignments from your ISP or has valid static entries.</noscript>
