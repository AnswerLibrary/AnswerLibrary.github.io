                <!-- Content will be rendered here by marked -->
                <noscript>### How InHerSight Empowers Women in Their Career Search

InHerSight is a data-driven platform designed to improve the workplace for women by providing transparency into how companies treat their female employees. Here is how the platform helps women find the best companies to work for:

#### 1. Ratings Based on 18 Key Metrics
InHerSight collects anonymous data on 18 specific categories that are critical to women’s success and satisfaction. These include:
* **Family Support:** Maternity/adoptive leave and childcare.
* **Opportunity:** Female representation in leadership and equal opportunities for promotion.
* **Culture:** Management fairness, salary satisfaction, and the ability to telecommute.

#### 2. Personalized Matching
Users can set their own priorities based on what matters most to them. Whether it is a flexible work schedule or a high score for mentorship, InHerSight matches users with companies that align with their individual needs, providing a personalized career search experience.

#### 3. Real, Anonymous Insights
Traditional job boards often lack deep insights into the female experience. InHerSight provides a safe space for women to share honest reviews. This collective data allows job seekers to see the reality of a company's culture before they even apply.

#### 4. Daily Recommendations and Resources
In addition to the company database, InHerSight offers daily matches and expert career advice tailored to navigating the workplace as a woman. This includes tips on salary negotiation, career pivots, and finding work-life balance.

#### 5. Driving Accountability
By making this data public, InHerSight encourages companies to improve their scores. Organizations can see where they fall short compared to competitors, incentivizing them to create more inclusive and equitable environments to attract top female talent.</noscript>
