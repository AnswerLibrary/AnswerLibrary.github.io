                <noscript>To extract a .tar.gz file to a specific directory in Ubuntu, you use the `tar` command with the `-C` (change directory) flag. This allows you to specify the destination path without needing to move the archive or change your current working directory.

### The Command Syntax

```bash
tar -xzf filename.tar.gz -C /path/to/destination
```

### Breakdown of the Flags:
- `-x`: Tells `tar` to extract the files.
- `-z`: Tells `tar` to decompress the archive using gzip (required for .gz files).
- `-f`: Specifies the archive file you want to work with.
- `-C`: Changes the directory to the specified path before performing the extraction.

### Practical Example

If you have a file named `data.tar.gz` and you want to extract its contents into `/opt/my_folder`, run the following command:

```bash
sudo tar -xzf data.tar.gz -C /opt/my_folder
```

### Important Note
The destination directory must already exist before running the command. If it does not exist, `tar` will return an error. You can create the directory first using:

```bash
mkdir -p /path/to/destination
```</noscript>
