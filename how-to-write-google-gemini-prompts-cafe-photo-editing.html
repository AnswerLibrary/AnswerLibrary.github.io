                <!-- Content will be rendered here by marked -->
                <noscript>### How to Craft Realistic Cafe-Style Prompts for Google Gemini
To get the best results from Google Gemini for cafe-style images, you need to focus on specific photography descriptors rather than vague terms. Use this guide to create stunning, realistic edits.

#### 1. The Core Formula
**[Subject] + [Action/Pose] + [Environment/Lighting] + [Camera Settings]**

#### 2. Essential Cafe Descriptors
*   **Lighting:** Warm ambient light, dappled sunlight through a window, soft bokeh, glowing overhead Edison bulbs.
*   **Atmosphere:** Cozy, industrial, minimalist, rustic, or bustling.
*   **Textures:** Ceramic mug, condensation on a glass, wood grain table, steam rising from a latte.

#### 3. Photography Keywords for Realism
To move away from an 'AI look,' include these:
*   **Focal Length:** 35mm or 50mm (standard for lifestyle photography).
*   **Aperture:** f/1.8 or f/2.8 (creates that beautiful blurry background/bokeh).
*   **Film Stock:** Portra 400 or Fujifilm Pro 400H (for natural skin tones and organic color grading).

#### 4. Example Prompts
*   **The Cozy Morning:** "A realistic photo of a ceramic mug of latte art on a weathered oak table. Soft morning sunlight streaming through a cafe window with dust motes visible. Shallow depth of field, f/2.8, highly detailed textures, 4k."
*   **The Lifestyle Shot:** "A person working on a laptop in a modern minimalist cafe. Warm indoor lighting, blurred background showing other patrons, candid style, shot on 35mm lens, natural colors, high resolution."
*   **The Close-Up:** "Macro shot of an iced coffee with condensation droplets on the glass, sitting on a marble countertop in a bright cafe. Cinematic lighting, sharp focus on the ice cubes, shot on Sony A7R IV."

#### 5. Pro Tip: Refining the Edit
If Gemini's first attempt is too 'perfect' or plastic-looking, add instructions like 'add natural film grain,' 'slightly underexposed,' or 'unprocessed RAW photo style' to enhance the authenticity.</noscript>
